<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 Subir PDF · observatorio</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #0aff0a;
            --neon-red: #ff003c;
            --neon-yellow: #ffee00;
            --neon-orange: #ff6b35;
            --bg-dark: #0a0a0f;
            --bg-terminal: #0d1117;
            --border: #30363d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--neon-orange);
            padding-bottom: 20px;
        }
        
        .glitch-title {
            font-size: 2.5rem;
            color: var(--neon-orange);
            text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-yellow);
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-yellow); }
            92% { text-shadow: -2px 0 var(--neon-red), 2px 0 var(--neon-yellow); }
            94% { text-shadow: 2px 0 var(--neon-yellow), -2px 0 var(--neon-red); }
        }
        
        .subheader {
            color: var(--neon-green);
            margin-top: 10px;
            font-size: 1.1rem;
        }
        
        .volver {
            margin-bottom: 20px;
        }
        
        .volver a {
            color: var(--neon-orange);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .volver a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }
        
        .terminal {
            background: var(--bg-terminal);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.1);
        }
        
        label {
            display: block;
            color: var(--neon-yellow);
            margin: 15px 0 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            background: #010409;
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--neon-orange);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: block;
            background: linear-gradient(45deg, #21262d, #30363d);
            border: 2px dashed var(--neon-orange);
            color: var(--neon-orange);
            padding: 40px 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }
        
        .file-label:hover {
            background: rgba(255, 107, 53, 0.1);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            transform: translateY(-2px);
        }
        
        .file-label::before {
            content: "📄 ";
            font-size: 2rem;
        }
        
        small {
            color: var(--neon-orange);
            display: block;
            margin-top: 5px;
        }
        
        .preview-container {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
        }
        
        .pdf-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-red)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px var(--neon-red)); }
        }
        
        .pdf-info {
            background: rgba(255, 107, 53, 0.1);
            border-left: 3px solid var(--neon-orange);
            padding: 15px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 15px;
        }
        
        .pdf-info h4 {
            color: var(--neon-orange);
            margin-bottom: 8px;
        }
        
        .pdf-info p {
            color: #8b949e;
            font-size: 0.9rem;
            margin: 4px 0;
        }
        
        .pdf-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .meta-tag {
            background: rgba(255, 107, 53, 0.2);
            color: var(--neon-orange);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            border: 1px solid var(--neon-orange);
        }
        
        .btn-success, .btn-secondary, .btn-danger, .btn-refresh {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #238636, #2ea043);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(35, 134, 54, 0.5);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #6e7681, #8b949e);
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(110, 118, 129, 0.5);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #da3633, #f85149);
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(218, 54, 51, 0.5);
        }
        
        .btn-refresh {
            background: linear-gradient(45deg, #ff6b35, #ffee00);
            color: #0a0a0f;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.5);
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--neon-orange);
        }
        
        .qid-input {
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        /* Sección de PDFs existentes */
        .existing-pdfs {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .section-title {
            color: var(--neon-orange);
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }
        
        .loading {
            text-align: center;
            color: var(--neon-orange);
            padding: 20px;
            animation: pulse 1.5s infinite;
        }
        
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        @media (max-width: 640px) {
            .pdf-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .pdf-card {
            background: var(--bg-terminal);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .pdf-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-yellow));
        }
        
        .pdf-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.2);
            border-color: var(--neon-orange);
        }
        
        .pdf-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .pdf-card-icon {
            font-size: 2.5rem;
        }
        
        .pdf-card-title {
            color: var(--neon-green);
            font-size: 1rem;
            font-weight: bold;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .pdf-card-meta {
            color: #8b949e;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        
        .pdf-card-description {
            color: #c9d1d9;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 15px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        
        .pdf-preview-thumb {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
            border: 1px dashed var(--border);
            border-radius: 8px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .pdf-preview-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .pdf-preview-text {
            color: #8b949e;
            font-size: 0.8rem;
        }
        
        .pdf-actions {
            display: flex;
            gap: 8px;
        }
        
        .pdf-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid;
            cursor: pointer;
            font-family: inherit;
        }
        
        .pdf-btn-view {
            background: rgba(255, 107, 53, 0.1);
            color: var(--neon-orange);
            border-color: var(--neon-orange);
        }
        
        .pdf-btn-view:hover {
            background: var(--neon-orange);
            color: #0a0a0f;
        }
        
        .pdf-btn-download {
            background: rgba(10, 255, 10, 0.1);
            color: var(--neon-green);
            border-color: var(--neon-green);
        }
        
        .pdf-btn-download:hover {
            background: var(--neon-green);
            color: #0a0a0f;
        }
        
        .pdf-btn-github {
            background: rgba(110, 118, 129, 0.2);
            color: #8b949e;
            border-color: #8b949e;
        }
        
        .pdf-btn-github:hover {
            background: #8b949e;
            color: #0a0a0f;
        }
        
        .labels {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 12px;
        }
        
        .label {
            background: rgba(255, 107, 53, 0.15);
            color: var(--neon-orange);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        .label.tipo {
            background: rgba(0, 243, 255, 0.15);
            color: var(--neon-blue);
            border-color: rgba(0, 243, 255, 0.3);
        }
        
        .label.qid {
            background: rgba(255, 238, 0, 0.15);
            color: var(--neon-yellow);
            border-color: rgba(255, 238, 0, 0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .error-message {
            background: rgba(218, 54, 51, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .no-preview-notice {
            background: rgba(255, 238, 0, 0.1);
            border: 1px dashed var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="glitch-title">~/observatorio/pdf $</h1>
        <p class="subheader">> Subir documento PDF (máx 25MB)</p>
    </div>

    <div class="volver">
        <a href="/">← INICIO</a>
    </div>

    <div class="terminal">
        <form onsubmit="event.preventDefault(); subirPDF();">
            <label>📌 TÍTULO:</label>
            <input type="text" id="titulo" placeholder="Título del documento" required>

            <label>✍️ AUTOR/EDITOR:</label>
            <input type="text" id="autor" placeholder="Nombre del autor o institución">

            <label>🆔 QID (Wikidata):</label>
            <input type="text" id="qid" class="qid-input" placeholder="Q123456" pattern="Q[0-9]+" title="Formato: Q seguido de números (ej: Q123456)">
            <small>Identificador de Wikidata (opcional)</small>

            <label>📝 DESCRIPCIÓN/RESUMEN:</label>
            <textarea id="descripcion" rows="3" placeholder="Breve descripción o resumen del contenido..."></textarea>

            <label>📚 TIPO DE DOCUMENTO:</label>
            <select id="tipoDocumento">
                <option value="articulo">📰 Artículo científico</option>
                <option value="informe">📊 Informe/Tesis</option>
                <option value="libro">📖 Libro/Capítulo</option>
                <option value="presentacion">📑 Presentación</option>
                <option value="manual">🔧 Manual/Guía</option>
                <option value="legal">⚖️ Documento legal</option>
                <option value="otro">📎 Otro</option>
            </select>

            <label>🏷️ ETIQUETAS:</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" value="investigacion" class="tag-check"> Investigación
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="educativo" class="tag-check"> Educativo
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="tecnico" class="tag-check"> Técnico
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="historico" class="tag-check"> Histórico
                </label>
            </div>

            <label>🔗 URL EXTERNA (opcional):</label>
            <input type="url" id="urlExterna" placeholder="https://doi.org/... o enlace alternativo">

            <label>📄 SELECCIONAR PDF:</label>
            <label for="archivo" class="file-label" id="fileLabel">
                Haz clic para seleccionar PDF<br>
                <small style="color: #8b949e; margin-top: 10px;">o arrastra aquí</small>
            </label>
            <input type="file" id="archivo" accept=".pdf,application/pdf" onchange="previsualizar(this)">
            <small>PDF · Máx 25MB</small>

            <div id="vistaPrevia" class="preview-container" style="display: none;">
                <div class="pdf-icon">📕</div>
                <div class="pdf-info">
                    <h4 id="pdfNombre">documento.pdf</h4>
                    <div class="pdf-meta">
                        <span class="meta-tag" id="pdfTamaño">0 MB</span>
                        <span class="meta-tag" id="pdfPaginas">📄 ? páginas</span>
                    </div>
                </div>
                <p style="text-align: center;">
                    <button type="button" onclick="quitarPDF()" class="btn-danger">✖ ELIMINAR</button>
                </p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-success">🚀 SUBIR A GITHUB</button>
                <button type="button" onclick="history.back()" class="btn-secondary">↩ CANCELAR</button>
            </div>
        </form>
    </div>

    <!-- Sección de PDFs existentes -->
    <div class="existing-pdfs">
        <h2 class="section-title">📚 Documentos en el Observatorio</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="cargarPDFsExistentes()" class="btn-refresh">🔄 Actualizar Lista</button>
        </div>
        <div id="pdfsContainer">
            <div class="loading">⏳ Cargando documentos desde GitHub...</div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'paulaflechadadeai';
        const GITHUB_REPO = 'paulaflechadadeai.github.io';
        let archivoSeleccionado = null;

        document.addEventListener('DOMContentLoaded', () => {
            cargarPDFsExistentes();
        });

        function previsualizar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                if (file.type !== 'application/pdf') {
                    alert("❌ El archivo debe ser un PDF");
                    input.value = '';
                    return;
                }
                
                if (file.size > 25 * 1024 * 1024) {
                    alert("❌ El PDF debe ser menor de 25MB");
                    input.value = '';
                    return;
                }

                archivoSeleccionado = {
                    datos: null,
                    nombre: file.name,
                    tipo: 'pdf',
                    tamaño: (file.size / (1024 * 1024)).toFixed(2),
                    paginas: 'Desconocido'
                };
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const contenido = e.target.result;
                    const matches = contenido.match(/\/Type\s*\/Page[^s]/g);
                    if (matches) {
                        archivoSeleccionado.paginas = matches.length;
                    }
                    actualizarVistaPrevia();
                };
                reader.readAsText(file.slice(0, 50000));
                
                actualizarVistaPrevia();
                document.getElementById('fileLabel').style.borderColor = 'var(--neon-green)';
            }
        }

        function actualizarVistaPrevia() {
            document.getElementById('pdfNombre').textContent = archivoSeleccionado.nombre;
            document.getElementById('pdfTamaño').textContent = `💾 ${archivoSeleccionado.tamaño} MB`;
            document.getElementById('pdfPaginas').textContent = `📄 ${archivoSeleccionado.paginas} páginas`;
            document.getElementById('vistaPrevia').style.display = 'block';
        }

        function quitarPDF() {
            archivoSeleccionado = null;
            document.getElementById('vistaPrevia').style.display = 'none';
            document.getElementById('archivo').value = '';
            document.getElementById('fileLabel').style.borderColor = 'var(--neon-orange)';
        }

        function subirPDF() {
            const titulo = document.getElementById('titulo').value.trim();
            const autor = document.getElementById('autor').value.trim();
            const qid = document.getElementById('qid').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const tipoDocumento = document.getElementById('tipoDocumento').value;
            const urlExterna = document.getElementById('urlExterna').value.trim();
            
            const etiquetas = Array.from(document.querySelectorAll('.tag-check:checked')).map(cb => cb.value);

            if (!titulo) {
                alert("⚠️ El título es obligatorio");
                return;
            }

            if (!archivoSeleccionado && !urlExterna) {
                alert("⚠️ Selecciona un PDF o proporciona una URL externa");
                return;
            }

            const tiposEmoji = {
                'articulo': '📰',
                'informe': '📊',
                'libro': '📖',
                'presentacion': '📑',
                'manual': '🔧',
                'legal': '⚖️',
                'otro': '📎'
            };

            let cuerpo = '';
            
            cuerpo += `${tiposEmoji[tipoDocumento] || '📄'} **Tipo:** ${tipoDocumento}\n`;
            if (autor) cuerpo += `✍️ **Autor:** ${autor}\n`;
            if (qid) cuerpo += `🆔 **QID:** [${qid}](https://www.wikidata.org/wiki/${qid})\n`;
            
            if (etiquetas.length > 0) {
                cuerpo += `🏷️ **Etiquetas:** ${etiquetas.join(', ')}\n`;
            }
            
            cuerpo += `\n## 📝 Resumen\n${descripcion || 'Sin descripción'}\n\n`;
            
            if (archivoSeleccionado) {
                cuerpo += `## 📄 Archivo\n`;
                cuerpo += `- **Nombre:** ${archivoSeleccionado.nombre}\n`;
                cuerpo += `- **Tamaño:** ${archivoSeleccionado.tamaño} MB\n`;
                cuerpo += `- **Páginas:** ${archivoSeleccionado.paginas}\n\n`;
                cuerpo += `⬆️ **Acción requerida:** Arrastra el archivo PDF al issue para subirlo\n\n`;
            }
            
            if (urlExterna) {
                cuerpo += `## 🔗 Enlace externo\n[Acceder al documento](${urlExterna})\n\n`;
            }

            cuerpo += `---\n*Subido desde observatorio-pdf*`;

            let labels = `pdf,${tipoDocumento},observatorio`;
            if (etiquetas.includes('investigacion')) labels += ',investigacion';

            window.open(
                `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/issues/new?title=${encodeURIComponent('📄 ' + titulo)}&body=${encodeURIComponent(cuerpo)}&labels=${encodeURIComponent(labels)}`,
                '_blank'
            );

            document.getElementById('titulo').value = '';
            document.getElementById('autor').value = '';
            document.getElementById('qid').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('urlExterna').value = '';
            document.getElementById('tipoDocumento').value = 'articulo';
            document.querySelectorAll('.tag-check').forEach(cb => cb.checked = false);
            quitarPDF();
            
            alert("✅ Se abrió GitHub. Si subiste un archivo, arrástralo al issue y publícalo.");
        }

        async function cargarPDFsExistentes() {
            const container = document.getElementById('pdfsContainer');
            container.innerHTML = '<div class="loading">⏳ Cargando documentos desde GitHub...</div>';

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?labels=pdf&state=all&per_page=30`
                );
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📄</div>
                            <p>No hay documentos registrados aún.</p>
                            <p style="font-size: 0.9rem; margin-top: 10px;">¡Sé el primero en subir uno!</p>
                        </div>
                    `;
                    return;
                }

                const pdfCards = issues.map(issue => crearPDFCard(issue)).join('');
                container.innerHTML = `<div class="pdf-grid">${pdfCards}</div>`;
                
            } catch (error) {
                console.error('Error al cargar PDFs:', error);
                container.innerHTML = `
                    <div class="error-message">
                        ❌ Error al cargar los documentos: ${error.message}<br>
                        <small>Verifica tu conexión o que el repositorio sea público</small>
                    </div>
                `;
            }
        }

        function crearPDFCard(issue) {
            const body = issue.body || '';
            const tipoMatch = body.match(/\*\*Tipo:\*\*\s*(\w+)/);
            const autorMatch = body.match(/\*\*Autor:\*\*\s*([^\n]+)/);
            const qidMatch = body.match(/\*\*QID:\*\*\s*\[?(Q\d+)\]?/);
            
            const tipo = tipoMatch ? tipoMatch[1] : 'documento';
            const autor = autorMatch ? autorMatch[1].trim() : null;
            const qid = qidMatch ? qidMatch[1] : null;
            
            // Extraer descripción
            let descripcion = '';
            const descripcionMatch = body.match(/## 📝 Resumen\n([\s\S]*?)(?=\n\n##|$)/);
            if (descripcionMatch) {
                descripcion = descripcionMatch[1].trim();
            }
            
            // Buscar URLs de PDF
            const { pdfUrl, esGitHubAsset, esExterno } = buscarUrlPDF(body);
            
            const tiposEmoji = {
                'articulo': '📰',
                'informe': '📊',
                'libro': '📖',
                'presentacion': '📑',
                'manual': '🔧',
                'legal': '⚖️',
                'otro': '📎'
            };
            
            const emoji = tiposEmoji[tipo] || '📄';
            const fecha = new Date(issue.created_at).toLocaleDateString('es-ES', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });

            // Extraer tamaño y páginas
            const tamañoMatch = body.match(/\*\*Tamaño:\*\*\s*([\d.]+)\s*MB/);
            const paginasMatch = body.match(/\*\*Páginas:\*\*\s*(\d+|Desconocido)/);
            const tamaño = tamañoMatch ? `${tamañoMatch[1]} MB` : null;
            const paginas = paginasMatch ? `${paginasMatch[1]} págs` : null;

            // Determinar si se puede visualizar directamente
            // Los assets de GitHub NO se pueden mostrar en iframe por seguridad
            const puedeVisualizar = pdfUrl && !esGitHubAsset;
            const necesitaGitHub = esGitHubAsset;

            return `
                <div class="pdf-card">
                    <div class="pdf-card-header">
                        <span class="pdf-card-icon">${emoji}</span>
                        <h3 class="pdf-card-title" title="${issue.title.replace('📄 ', '')}">${issue.title.replace('📄 ', '')}</h3>
                    </div>
                    
                    <div class="pdf-card-meta">
                        ${autor ? `<span>✍️ ${autor} · </span>` : ''}
                        <span>📅 ${fecha}</span>
                        ${tamaño ? `<span> · 💾 ${tamaño}</span>` : ''}
                        ${paginas ? `<span> · 📄 ${paginas}</span>` : ''}
                    </div>
                    
                    <div class="pdf-preview-thumb">
                        <span class="pdf-preview-icon">📕</span>
                        <span class="pdf-preview-text">PDF ${paginas || ''}</span>
                    </div>
                    
                    ${necesitaGitHub ? `
                        <div class="no-preview-notice">
                            ⚠️ Este PDF está alojado en GitHub.<br>
                            Abre el issue para verlo/descargarlo.
                        </div>
                    ` : ''}
                    
                    <div class="pdf-card-description">${descripcion || 'Sin descripción disponible'}</div>
                    
                    <div class="pdf-actions">
                        ${puedeVisualizar ? `
                            <a href="${pdfUrl}" target="_blank" class="pdf-btn pdf-btn-view">
                                👁️ Ver
                            </a>
                            <a href="${pdfUrl}" download class="pdf-btn pdf-btn-download">
                                ⬇️ Descargar
                            </a>
                        ` : `
                            <a href="${issue.html_url}" target="_blank" class="pdf-btn pdf-btn-github" style="flex: 2;">
                                🔗 Abrir en GitHub
                            </a>
                        `}
                    </div>
                    
                    <div class="labels">
                        <span class="label tipo">${tipo}</span>
                        ${qid ? `<span class="label qid">🆔 ${qid}</span>` : ''}
                    </div>
                </div>
            `;
        }

        function buscarUrlPDF(body) {
            // Buscar enlace externo primero (estos sí funcionan)
            const enlaceExterno = body.match(/\[Acceder al documento\]\((https:\/\/[^)]+)\)/);
            if (enlaceExterno) {
                return { 
                    pdfUrl: enlaceExterno[1], 
                    esGitHubAsset: false,
                    esExterno: true 
                };
            }
            
            // Buscar URL directa de PDF (no GitHub)
            const urlDirecta = body.match(/(https:\/\/[^"\s]+\.pdf)/i);
            if (urlDirecta && !urlDirecta[1].includes('github.com/user-attachments')) {
                return { 
                    pdfUrl: urlDirecta[1], 
                    esGitHubAsset: false,
                    esExterno: true 
                };
            }
            
            // Buscar adjuntos de GitHub (NO se pueden visualizar directamente)
            const assetRegex = /https:\/\/github\.com\/user-attachments\/assets\/[a-zA-Z0-9-]+/g;
            const assets = body.match(assetRegex);
            if (assets && assets.length > 0) {
                return { 
                    pdfUrl: assets[0], 
                    esGitHubAsset: true,
                    esExterno: false 
                };
            }
            
            return { pdfUrl: null, esGitHubAsset: false, esExterno: false };
        }

        // Drag and drop
        const fileLabel = document.getElementById('fileLabel');
        
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = 'rgba(255, 107, 53, 0.2)';
        });
        
        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = '';
        });
        
        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('archivo').files = files;
                previsualizar(document.getElementById('archivo'));
            }
        });
    </script>
</body>
</html>
