<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload - Cloudinary + Turso</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px}
.box{border:3px solid #f0f;padding:20px;border-radius:15px;max-width:500px;margin:30px auto}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:#000;border:2px solid #0f0;color:#0f0;font-size:14px}
button{width:100%;padding:15px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer;margin:10px 0;border-radius:5px}
.hidden{display:none}
.log{margin-top:10px;padding:10px;border:2px solid #333;font-size:12px;max-height:200px;overflow-y:auto;background:#0a0a0a}
.ok{color:#0f0}.err{color:#f00}.info{color:#0af}.warn{color:#ff0}
.preview{max-width:100%;height:150px;object-fit:cover;border-radius:5px;margin:10px 0;border:1px solid #444}
</style>
</head>
<body>

<div id="login" class="box">
<h1>🔐 Zona Restringida</h1>
<input type="password" id="p" placeholder="Código">
<button onclick="entrar()">ACCEDER</button>
</div>

<div id="panel" class="box hidden">
<h1>📤 Upload Cloudinary + Turso</h1>
<p style="color:#666;font-size:12px">Todos verán tu contenido</p>

<input type="file" id="file" accept="image/*,video/*">
<img id="preview" class="preview hidden">
<video id="previewVid" class="preview hidden" controls></video>

<select id="type">
<option value="image">📷 Imagen</option>
<option value="video">🎥 Video</option>
</select>

<textarea id="cap" placeholder="Descripción" rows="2"></textarea>

<select id="level">
<option value="1">🔥 Nivel 1</option>
<option value="2">🔥 Nivel 2</option>
<option value="3" selected>🔥 Nivel 3</option>
<option value="4">🔥🔥 Nivel 4</option>
<option value="5">🔥🔥 Nivel 5</option>
</select>

<input type="text" id="tags" placeholder="Tags (coma separados)">
<button onclick="subir()">☁️ SUBIR A LA NUBE</button>
<button onclick="irGestion()" style="background:#00f;color:#fff">📋 GESTIONAR</button>
<button onclick="salir()" style="background:#f00;color:#fff">🚪 SALIR</button>

<div id="log" class="log hidden"></div>
</div>

<script>
// ===== CONFIGURACIÓN =====
const CLOUDINARY = {
    cloudName: 'dhzbiptj0',
    apiKey: '493791116199482',
    apiSecret: 'ONqRl4eUj2cto-Pe_KlPZjxOeCI',
    uploadPreset: 'paula-controversial'
};

const TURSO = {
    url: 'libsql://controversial-db-paulaflechadadeai.aws-us-east-1.turso.io',
    authToken: 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzMzNDIzMTksImlkIjoiMDE5Y2UzNmMtOWYwMS03YWM3LWFkNTMtNmNhMmIxNDk0MjJhIiwicmlkIjoiYmUzOTQ4YWUtMzJjNS00YjdjLWFmMjYtNjQ2ZTM5NzMyZWU3In0.2mm72hfz1VQhE0j3rjdzeqXHHzMH2PJv3CUwuKiNS4_3PBTf4PRaDgcMxKLIlAtyXJLZ-U-xWEc10nsR6kvsBg'
};

// ===== LOGIN =====
function entrar(){if(document.getElementById('p').value==='patito123'){sessionStorage.setItem('ok','1');document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}else{alert('❌ Incorrecto');}}
function salir(){sessionStorage.removeItem('ok');location.reload();}
if(sessionStorage.getItem('ok')==='1'){document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}
function irGestion(){window.location.href='gestionar-cloudinary.html';}

// ===== LOG =====
function log(m,t){var l=document.getElementById('log');l.classList.remove('hidden');l.innerHTML+='<div class="'+t+'">> '+m+'</div>';l.scrollTop=l.scrollHeight;}

// ===== PREVIEW =====
document.getElementById('file').addEventListener('change',function(e){
var file=e.target.files[0];if(!file)return;
var preview=document.getElementById('preview');
var previewVid=document.getElementById('previewVid');
preview.classList.add('hidden');previewVid.classList.add('hidden');
if(file.type.startsWith('image/')){preview.src=URL.createObjectURL(file);preview.classList.remove('hidden');}
else if(file.type.startsWith('video/')){previewVid.src=URL.createObjectURL(file);previewVid.classList.remove('hidden');}
});

// ===== SUBIR =====
async function subir(){
var file=document.getElementById('file').files[0];
if(!file){log('❌ Selecciona un archivo','err');return;}

log('⏳ Preparando...','info');

try{
// 1. Subir a Cloudinary
log('⏳ Subiendo a Cloudinary...','info');var formData=new FormData();
formData.append('file',file);
formData.append('upload_preset',CLOUDINARY.uploadPreset);
formData.append('api_key',CLOUDINARY.apiKey);

var res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY.cloudName+'/auto/upload',{
method:'POST',
body:formData
});

if(!res.ok)throw new Error('Error Cloudinary: '+res.status);
var data=await res.json();
var url=data.secure_url;
log('✅ Cloudinary: '+url,'ok');

// 2. Guardar en Turso
log('⏳ Guardando en Turso...','info');
var item={
id:Date.now().toString(),
type:document.getElementById('type').value,
url:url,
caption:document.getElementById('cap').value,
controversy_level:parseInt(document.getElementById('level').value),
tags:document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(t=>t),
is_active:1,
views_count:0,
created_at:new Date().toISOString()
};

await fetch(TURSO.url,{
method:'POST',
headers:{
'Authorization':'Bearer '+TURSO.authToken,
'Content-Type':'application/json'
},
body:JSON.stringify({
query:'INSERT INTO controversial_content (id,type,url,caption,controversy_level,tags,is_active,views_count,created_at) VALUES (?,?,?,?,?,?,?,?,?)',
params:[item.id,item.type,item.url,item.caption,item.controversy_level,JSON.stringify(item.tags),item.is_active,item.views_count,item.created_at]
})
});

log('✅ Turso: Metadata guardada','ok');
log('🎉 ¡LISTO! Todos pueden verlo','ok');
log('💡 Recarga tu web para ver el contenido','info');

// Limpiar
document.getElementById('file').value='';
document.getElementById('cap').value='';
document.getElementById('tags').value='';
document.getElementById('preview').classList.add('hidden');document.getElementById('previewVid').classList.add('hidden');

}catch(e){
log('❌ Error: '+e.message,'err');
console.error(e);
}
}
</script>
</body>
</html>
