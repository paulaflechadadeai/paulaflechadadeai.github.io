<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionar - Cloudinary + Turso</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px}
.box{border:2px solid #f0f;padding:15px;margin:10px 0;border-radius:10px}
h1,h2{color:#f0f;margin-top:0}
.item{border:1px solid #333;padding:10px;margin:10px 0;border-radius:5px;background:#0a0a0a}
.item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.item-info{font-size:12px;color:#666}
.media-container{margin:10px 0}
img,video{max-width:100%;height:150px;object-fit:cover;border-radius:5px;border:1px solid #444}
.btn{padding:8px 15px;margin:5px;border:none;cursor:pointer;border-radius:5px;font-weight:bold;font-family:monospace}
.btn-del{background:#f00;color:#fff}
.btn-keep{background:#0f0;color:#000}
.btn-hide{background:#f80;color:#000}
.btn-show{background:#0af;color:#000}
.btn-export{background:#00f;color:#fff;width:100%;padding:15px;margin:10px 0}
.btn-clear{background:#f00;color:#fff;width:100%;padding:15px;margin:10px 0}
.info{color:#0af;font-size:12px}
.warn{color:#ff0;font-size:12px}
.err{color:#f00;font-size:12px}
.ok{color:#0f0;font-size:12px}
.video-badge{background:#f00;color:#fff;padding:2px 8px;border-radius:3px;font-size:10px;margin-left:5px}
.image-badge{background:#0af;color:#fff;padding:2px 8px;border-radius:3px;font-size:10px;margin-left:5px}
.no-items{text-align:center;padding:40px;color:#666;font-size:14px}
.loading{text-align:center;padding:20px;color:#0af}
</style>
</head>
<body>

<div class="box">
<h1>📋 Gestionar Contenido</h1>
<div id="loading" class="loading">⏳ Cargando desde Turso...</div>
<div style="display:flex;gap:10px;margin-top:10px">
<button onclick="location.href='upload-cloudinary.html'" class="btn" style="flex:1;background:#0f0;color:#000">📤 SUBIR NUEVO</button>
<button onclick="location.href='index.html'" class="btn" style="flex:1;background:#00f;color:#fff">🏠 ADMIN</button>
<button onclick="location.href='../index.html'" class="btn" style="flex:1;background:#f0f;color:#000">🌐 VER WEB</button>
</div>
</div>

<div id="lista"></div>

<div class="box">
<h2>⚠️ Zona de Peligro</h2>
<button onclick="exportarBackup()" class="btn btn-export">📥 EXPORTAR BACKUP LOCAL</button>
</div>
<script>
const TURSO_URL='libsql://controversial-db-paulaflechadadeai.aws-us-east-1.turso.io';
const TURSO_TOKEN='eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzMzNDIzMTksImlkIjoiMDE5Y2UzNmMtOWYwMS03YWM3LWFkNTMtNmNhMmIxNDk0MjJhIiwicmlkIjoiYmUzOTQ4YWUtMzJjNS00YjdjLWFmMjYtNjQ2ZTM5NzMyZWU3In0.2mm72hfz1VQhE0j3rjdzeqXHHzMH2PJv3CUwuKiNS4_3PBTf4PRaDgcMxKLIlAtyXJLZ-U-xWEc10nsR6kvsBg';
const LOCAL_KEY='controversial_cache';

async function cargarItems(){
try{
const res=await fetch(TURSO_URL+'?sql=SELECT * FROM controversial_content ORDER BY created_at DESC',{headers:{'Authorization':'Bearer '+TURSO_TOKEN}});
const data=await res.json();
const items=data.rows||[];

document.getElementById('loading').style.display='none';

var html='<div class="box"><h2>📁 Contenido ('+items.length+' items)</h2>';

if(items.length===0){
html+='<div class="no-items">📂 Sin contenido aún<br><small>Sube tu primer contenido</small></div>';
}else{
items.forEach((item,index)=>{
var badge=item.type==='video'?'<span class="video-badge">🎥 VIDEO</span>':'<span class="image-badge">📷 FOTO</span>';

html+='<div class="item" style="border-left:4px solid '+(item.is_active?'#0f0':'#f00')+'">';
html+='<div class="item-header"><div><strong>#'+(index+1)+'</strong> '+badge+'</div><div class="item-info">🕐 '+new Date(item.created_at).toLocaleString()+'</div></div>';

html+='<div class="media-container">';
if(item.type==='image'){
html+='<img src="'+item.url+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22150%22%3E%3Crect fill=%22%23333%22 width=%22400%22 height=%22150%22/%3E%3Ctext fill=%22%23f00%22 x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22%3EError%3C/text%3E%3C/svg%3E\'">';
}else{
html+='<video src="'+item.url+'" controls></video>';
}
html+='</div>';

if(item.caption){html+='<div style="margin:10px 0"><strong>📝 '+item.caption+'</strong></div>';}

html+='<div class="item-info">🔥 Nivel '+item.controversy_level+' ('+'🔥'.repeat(item.controversy_level)+')<br>';
if(item.tags){var tags=JSON.parse(item.tags)||[];if(tags.length>0)html+='🏷️ Tags: '+tags.join(', ');}
html+='</div>';

html+='<div style="margin-top:10px;display:flex;gap:5px;flex-wrap:wrap">';
if(item.is_active){
html+='<button onclick="toggleStatus(\''+item.id+'\')" class="btn btn-hide">👁️ OCULTAR</button>';
}else{
html+='<button onclick="toggleStatus(\''+item.id+'\')" class="btn btn-show">✅ MOSTRAR</button>';
}
html+='<button onclick="eliminar(\''+item.id+'\')" class="btn btn-del">🗑️ ELIMINAR</button>';
html+='</div></div>';
});
}
html+='</div>';document.getElementById('lista').innerHTML=html;

// Guardar cache local
localStorage.setItem(LOCAL_KEY,JSON.stringify(items));

}catch(e){
console.error('Error:',e);
document.getElementById('loading').innerHTML='<span style="color:#f00">❌ Error al cargar<br>'+e.message+'</span>';

// Intentar cargar de cache local
var cached=JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]');
if(cached.length>0){
cargarDesdeCache(cached);
}
}
}

function cargarDesdeCache(items){
document.getElementById('loading').style.display='none';
var html='<div class="box"><h2>📁 Contenido (cache local)</h2><p class="warn">⚠️ Mostrando cache - Conéctate para ver datos actualizados</p>';
items.forEach((item,index)=>{
html+='<div class="item"><div class="item-info">'+(item.caption||'Sin descripción')+'</div></div>';
});
html+='</div>';
document.getElementById('lista').innerHTML=html;
}

async function eliminar(id){
if(confirm('¿Eliminar este item permanentemente?')){
try{
await fetch(TURSO_URL,{method:'POST',headers:{'Authorization':'Bearer '+TURSO_TOKEN,'Content-Type':'application/json'},body:JSON.stringify({query:'DELETE FROM controversial_content WHERE id=?',params:[id]})});
alert('✅ Eliminado');
cargarItems();
}catch(e){alert('❌ Error: '+e.message);}
}
}

async function toggleStatus(id){
try{
await fetch(TURSO_URL,{method:'POST',headers:{'Authorization':'Bearer '+TURSO_TOKEN,'Content-Type':'application/json'},body:JSON.stringify({query:'UPDATE controversial_content SET is_active=NOT is_active WHERE id=?',params:[id]})});
cargarItems();
}catch(e){alert('❌ Error: '+e.message);}
}

function exportarBackup(){
var items=JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]');
if(items.length===0){alert('⚠️ No hay contenido en cache');return;}
var blob=new Blob([JSON.stringify({version:'2.0',exportedAt:new Date().toISOString(),totalItems:items.length,data:items},null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download='backup-controversial-'+Date.now()+'.json';a.click();alert('📦 Backup descargado: '+a.download+'\n\nGuárdalo en un lugar seguro');
}

// Cargar al iniciar
cargarItems();

// Auto-refresh cada 60 segundos
setInterval(cargarItems,60000);
</script>
</body>
</html>
