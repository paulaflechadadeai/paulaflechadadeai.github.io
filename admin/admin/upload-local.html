<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Local - Sin APIs</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px}
.box{border:3px solid #f0f;padding:20px;border-radius:15px;max-width:500px;margin:30px auto}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:#000;border:2px solid #0f0;color:#0f0}
button{width:100%;padding:15px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer;margin:10px 0}
.hidden{display:none}
.log{margin-top:10px;padding:10px;border:2px solid #333;font-size:12px;max-height:200px;overflow-y:auto}
.ok{color:#0f0}.err{color:#f00}.info{color:#0af}
</style>
</head>
<body>

<div id="login" class="box">
<h1>🔐 Zona Restringida</h1>
<input type="password" id="p" placeholder="Código">
<button onclick="entrar()">ACCEDER</button>
</div>

<div id="panel" class="box hidden">
<h1>📁 Upload Local</h1>
<p style="color:#666;font-size:12px">Todo se guarda en TU navegador</p>

<input type="file" id="file" accept="image/*">
<select id="type"><option value="image">📷 Imagen</option></select>
<textarea id="cap" placeholder="Descripción" rows="2"></textarea>
<select id="level">
<option value="1">🔥 Nivel 1</option>
<option value="2">🔥🔥 Nivel 2</option>
<option value="3" selected>🔥🔥 Nivel 3</option>
<option value="4">🔥🔥🔥 Nivel 4</option>
<option value="5">🔥🔥🔥 Nivel 5</option>
</select>
<input type="text" id="tags" placeholder="Tags (coma separados)">

<button onclick="subir()">💾 GUARDAR LOCAL</button>
<button onclick="exportar()">📤 EXPORTAR BACKUP</button>
<button onclick="salir()" style="background:#f00;color:#fff">🚪 SALIR</button>

<div id="log" class="log hidden"></div>
</div>

<script>
function entrar(){if(document.getElementById('p').value==='patito123'){sessionStorage.setItem('ok','1');document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}else{alert('❌ Incorrecto');}}
function salir(){sessionStorage.removeItem('ok');location.reload();}if(sessionStorage.getItem('ok')==='1'){document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}

function log(m,t){var l=document.getElementById('log');l.classList.remove('hidden');l.innerHTML+='<div class="'+t+'">> '+m+'</div>';l.scrollTop=l.scrollHeight;}

// Comprimir imagen a base64
function compressImage(file, maxWidth=800){return new Promise((resolve,reject)=>{
var img=new Image(),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
img.onload=()=>{
var ratio=Math.min(maxWidth/img.width,1);
canvas.width=img.width*ratio;canvas.height=img.height*ratio;
ctx.drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL('image/jpeg',0.7));
};
img.onerror=reject;
img.src=URL.createObjectURL(file);
});}

async function subir(){
var file=document.getElementById('file').files[0];
if(!file){log('❌ Selecciona una imagen','err');return;}
log('⏳ Procesando...','info');
try{
var base64=await compressImage(file);
var item={
id:Date.now(),
type:'image',
url:base64,
caption:document.getElementById('cap').value,
controversy_level:parseInt(document.getElementById('level').value),
tags:document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(t=>t),
is_active:true,
views_count:0,
createdAt:new Date().toISOString()
};
// Guardar en localStorage
var key='controversial_local';
var items=JSON.parse(localStorage.getItem(key)||'[]');
items.unshift(item);
localStorage.setItem(key,JSON.stringify(items));
log('✅ ¡Guardado en tu navegador!','ok');
log('💡 Aparece en tu web inmediatamente','info');
document.getElementById('file').value='';document.getElementById('cap').value='';document.getElementById('tags').value='';
}catch(e){log('❌ Error: '+e.message,'err');}}

function exportar(){
var key='controversial_local';
var items=JSON.parse(localStorage.getItem(key)||'[]');
if(items.length===0){log('⚠️ No hay datos para exportar','info');return;}
var blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='backup-controversial-'+Date.now()+'.json';a.click();
log('📦 Backup descargado - Guárdalo en Drive/USB','ok');}
</script>
</body>
</html>
