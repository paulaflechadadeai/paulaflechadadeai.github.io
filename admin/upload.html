<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 2px solid #f0f; padding: 30px; border-radius: 10px; max-width: 500px; margin: 50px auto; text-align: center; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 2px solid #0f0; color: #0f0; font-size: 16px; }
        button { background: #0f0; color: #000; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h1>🔐 Zona Restringida</h1>
        <input type="password" id="p" placeholder="Código">
        <button onclick="entrar()">ACCEDER</button>
    </div>

    <div id="panel" class="box hidden">
        <h1>✅ ACCESO CONCEDIDO</h1>
        <p>Aquí va el formulario de subida</p>
        <button onclick="salir()">SALIR</button>
    </div>

    <script>
        var CLAVE = 'patito123';
        
        function entrar() {
            var input = document.getElementById('p').value;
            console.log('Intentando entrar con:', input);
            console.log('Clave correcta:', CLAVE);
            
            if (input === CLAVE) {
                console.log('✓ Acceso concedido');
                document.getElementById('login').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
            } else {
                console.log('✗ Acceso denegado');
                alert('❌ Incorrecto');
            }
        }
        
        function salir() {
            document.getElementById('panel').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('p').value = '';
        }
        
        // Enter key
        document.getElementById('p').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') entrar();
        });
        
        console.log('Página cargada. CLAVE =', CLAVE);
    </script>
</body>
</html>
