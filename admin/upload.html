<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload - Admin</title>
<style>
body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
.box { border: 3px solid #f0f; padding: 20px; border-radius: 15px; max-width: 500px; margin: 30px auto; }
input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 2px solid #0f0; color: #0f0; font-size: 14px; }
button { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; }
.hidden { display: none; }
.msg { margin-top: 10px; padding: 10px; border: 2px solid; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="box">
<h1>🔐 Zona Restringida</h1>
<input type="password" id="p" placeholder="Código">
<button onclick="entrar()">ACCEDER</button>
</div>

<!-- UPLOAD -->
<div id="panel" class="box hidden">
<h1>🔥 Subir Contenido</h1>
<input type="file" id="file" accept="image/*,video/*">
<select id="type">
<option value="image">📷 Imagen</option>
<option value="video">🎥 Video</option>
</select>
<textarea id="cap" placeholder="Descripción" rows="3"></textarea>
<select id="level">
<option value="1">🔥 Nivel 1</option>
<option value="2">🔥 Nivel 2</option>
<option value="3" selected>🔥🔥🔥 Nivel 3</option>
<option value="4">🔥🔥🔥 Nivel 4</option>
<option value="5">🔥🔥🔥 Nivel 5</option>
</select>
<input type="text" id="tags" placeholder="Tags (coma separados)">
<button onclick="subir()">📤 SUBIR</button>
<button onclick="salir()" style="background:#f00;color:#fff;">🚪 SALIR</button>
<div id="msg" class="msg hidden"></div>
</div>

<script>
// LOGIN
function entrar() {
if (document.getElementById('p').value === 'patito123') {sessionStorage.setItem('ok', '1');
document.getElementById('login').style.display = 'none';
document.getElementById('panel').style.display = 'block';
} else {
alert('❌ Incorrecto');
}
}

function salir() {
sessionStorage.removeItem('ok');
location.reload();
}

// CHECK
if (sessionStorage.getItem('ok') === '1') {
document.getElementById('login').style.display = 'none';
document.getElementById('panel').style.display = 'block';
}

// SUBIR
async function subir() {
var file = document.getElementById('file').files[0];
var msg = document.getElementById('msg');

if (!file) {
msg.textContent = '❌ Selecciona archivo';
msg.className = 'msg';
msg.style.color = '#f00';
msg.style.borderColor = '#f00';
msg.classList.remove('hidden');
return;
}

msg.textContent = '⏳ Subiendo...';
msg.className = 'msg';
msg.style.color = '#0f0';
msg.style.borderColor = '#0f0';
msg.classList.remove('hidden');

try {
// Importar Supabase
var mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
var supabase = mod.createClient('https://zcgmpwyntuedqezl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZ21wd3ludHVlZHFlemJnZHl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzM2MjcsImV4cCI6MjA4ODU0OTYyN30.YsK-ByxL-gYv7woOlFmMGMlpusrHH-8gSmrxNpDKRqI');

// Subir archivo
var name = Date.now() + '_' + file.name.replace(/\s/g, '_');
var up = await supabase.storage.from('controversial-content').upload(name, file);

if (up.error) throw up.error;
// Obtener URL
var url = supabase.storage.from('controversial-content').getPublicUrl(name);

// Guardar en DB
var db = await supabase.from('controversial_content').insert({
type: document.getElementById('type').value,
url: url.data.publicUrl,
caption: document.getElementById('cap').value,
controversy_level: parseInt(document.getElementById('level').value),
tags: document.getElementById('tags').value.split(',').map(function(t){return t.trim();}).filter(function(t){return t;}),
is_active: true
});

if (db.error) throw db.error;

msg.textContent = '✅ ¡Subido!';
document.getElementById('file').value = '';
document.getElementById('cap').value = '';
document.getElementById('tags').value = '';

} catch (e) {
msg.textContent = '❌ Error: ' + e.message;
msg.style.color = '#f00';
msg.style.borderColor = '#f00';
}
}
</script>
</body>
</html>
