<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Admin</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }

        .box {
            border: 3px solid #ff00ff;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        h1 {
            color: #ff00ff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff00ff;
        }

        input[type="password"],
        input[type="file"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="password"]:focus,
        input[type="file"]:focus,        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #00ff00;
            color: #000;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        button:hover {
            background: #0f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-logout {
            background: #ff0000;
            color: #fff;
        }

        .btn-logout:hover {
            background: #f00;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .hidden {
            display: none;
        }

        .log {
            margin-top: 20px;
            padding: 15px;            border: 2px solid #333;
            border-radius: 5px;
            text-align: left;
            font-size: 12px;
            background: #0a0a0a;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #333;
            padding-left: 10px;
        }

        .log-info {
            color: #00aaff;
            border-left-color: #00aaff;
        }

        .log-success {
            color: #00ff00;
            border-left-color: #00ff00;
        }

        .log-error {
            color: #ff0000;
            border-left-color: #ff0000;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }

        @media (max-width: 600px) {
            .box {
                margin: 20px auto;
                padding: 20px;
            }
            
            button {
                font-size: 14px;
            }        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login" class="box">
        <h1 class="glitch">🔐 Zona Restringida</h1>
        <p style="color: #666; margin-bottom: 20px;">Acceso solo para administradores</p>
        <input type="password" id="password" placeholder="Ingresa el código secreto">
        <button onclick="entrar()">ACCEDER</button>
        <p style="color: #666; font-size: 12px; margin-top: 20px;">💡 Pista: patito123</p>
    </div>

    <!-- UPLOAD PANEL -->
    <div id="uploadPanel" class="box hidden">
        <h1 class="glitch">🔥 Subir Contenido</h1>
        <p style="color: #00aaff; margin-bottom: 20px;">Zona Controversial - Back4App</p>
        
        <input type="file" id="fileInput" accept="image/*,video/*">
        <p style="color: #666; font-size: 12px; margin: 5px 0;">📷 Imagen o 🎥 Video</p>
        
        <select id="typeSelect">
            <option value="image">📷 Imagen</option>
            <option value="video">🎥 Video</option>
        </select>
        
        <textarea id="captionInput" placeholder="Descripción del contenido..." rows="3"></textarea>
        
        <select id="levelSelect">
            <option value="1">🔥 Nivel 1 - Suave</option>
            <option value="2">🔥🔥 Nivel 2 - Moderado</option>
            <option value="3" selected>🔥🔥 Nivel 3 - Controversial</option>
            <option value="4">🔥🔥🔥 Nivel 4 - Muy controversial</option>
            <option value="5">🔥🔥🔥 Nivel 5 - Extremo</option>
        </select>
        
        <input type="text" id="tagsInput" placeholder="Tags (separados por coma: meme, viral, etc)">
        
        <button onclick="subirContenido()">📤 SUBIR CONTENIDO</button>
        <button onclick="salir()" class="btn-logout">🚪 SALIR</button>
        
        <div id="logContainer" class="log hidden">
            <div style="color: #ff00ff; margin-bottom: 10px; font-weight: bold;">📋 Log de operaciones:</div>
            <div id="logContent"></div>
        </div>
    </div>

    <!-- Parse SDK -->
    <script src="https://npmcdn.com/parse@2.19.0/dist/parse.min.js"></script>    
    <script>
    // ========================================
    // CONFIGURACIÓN DE BACK4APP
    // ========================================
    Parse.initialize("na15HGmYfZQBwHXv56AyjSWpEafZjSh4ufdiNKSW", "EiyEYPlRytJ15YPxW7PWPLTTH5Q369g1FiXKWRR7");
    Parse.serverURL = 'https://parseapi.back4app.com';

    // ========================================
    // FUNCIONES DE LOGIN
    // ========================================
    function entrar() {
        var pass = document.getElementById('password').value;
        if (pass === 'patito123') {
            sessionStorage.setItem('admin_logged', '1');
            mostrarPanel();
        } else {
            alert('❌ Código incorrecto\n\nInténtalo de nuevo.');
            document.getElementById('password').value = '';
        }
    }

    function salir() {
        sessionStorage.removeItem('admin_logged');
        location.reload();
    }

    function mostrarPanel() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('uploadPanel').classList.remove('hidden');
    }

    // Verificar si ya está logueado
    if (sessionStorage.getItem('admin_logged') === '1') {
        mostrarPanel();
    }

    // Permitir login con Enter
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !document.getElementById('login').classList.contains('hidden')) {
            entrar();
        }
    });

    // ========================================
    // FUNCIONES DE LOG
    // ========================================
    function log(mensaje, tipo) {
        var logContainer = document.getElementById('logContainer');
        var logContent = document.getElementById('logContent');        
        logContainer.classList.remove('hidden');
        
        var logClass = 'log-info';
        if (tipo === 'success') logClass = 'log-success';
        if (tipo === 'error') logClass = 'log-error';
        
        var hora = new Date().toLocaleTimeString();
        var logLine = document.createElement('div');
        logLine.className = 'log-line ' + logClass;
        logLine.innerHTML = '[' + hora + '] ' + mensaje;
        
        logContent.appendChild(logLine);
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    function clearLog() {
        document.getElementById('logContent').innerHTML = '';
    }

    // ========================================
    // FUNCIÓN PRINCIPAL DE SUBIDA
    // ========================================
    async function subirContenido() {
        clearLog();
        
        var fileInput = document.getElementById('fileInput');
        var typeSelect = document.getElementById('typeSelect');
        var captionInput = document.getElementById('captionInput');
        var levelSelect = document.getElementById('levelSelect');
        var tagsInput = document.getElementById('tagsInput');
        
        // Validar archivo
        var file = fileInput.files[0];
        if (!file) {
            log('❌ Error: Selecciona un archivo', 'error');
            return;
        }
        
        log('📁 Archivo seleccionado: ' + file.name, 'info');
        log('📊 Tamaño: ' + (file.size / 1024).toFixed(2) + ' KB', 'info');
        
        try {
            // Paso 1: Subir archivo a Back4App
            log('⏳ Subiendo archivo a Back4App...', 'info');
            
            var parseFile = new Parse.File(file.name, file);
            await parseFile.save({
                progress: function(progress) {
                    log('📤 Progreso: ' + Math.round(progress * 100) + '%', 'info');                }
            });
            
            var fileUrl = parseFile.url();
            log('✅ Archivo subido exitosamente', 'success');
            log('🔗 URL: ' + fileUrl, 'success');
            
            // Paso 2: Guardar en la base de datos
            log('⏳ Guardando en la base de datos...', 'info');
            
            var ControversialContent = Parse.Object.extend("ControversialContent");
            var item = new ControversialContent();
            
            // Configurar campos
            item.set("type", typeSelect.value);
            item.set("url", fileUrl);
            item.set("caption", captionInput.value.trim());
            item.set("controversy_level", parseInt(levelSelect.value));
            
            // Procesar tags
            var tagsText = tagsInput.value.trim();
            var tagsArray = tagsText ? tagsText.split(',').map(function(t) {
                return t.trim();
            }).filter(function(t) {
                return t.length > 0;
            }) : [];
            item.set("tags", tagsArray);
            
            // Campos adicionales
            item.set("is_active", true);
            item.set("views_count", 0);
            
            // Guardar
            await item.save();
            
            log('✅ Contenido guardado en la base de datos', 'success');
            log('🎉 ¡SUBIDA COMPLETADA!', 'success');
            log('💡 Recarga tu web para ver el contenido', 'success');
            
            // Limpiar formulario
            fileInput.value = '';
            captionInput.value = '';
            tagsInput.value = '';
            typeSelect.value = 'image';
            levelSelect.value = '3';
            
            // Alerta visual
            alert('✅ ¡Contenido subido exitosamente!\n\nRecarga tu web para verlo.');
            
        } catch (error) {            log('❌ Error: ' + error.message, 'error');
            log('💡 Verifica tu conexión e inténtalo de nuevo', 'error');
            console.error('Error detallado:', error);
        }
    }

    // ========================================
    // EFECTOS VISUALES
    // ========================================
    console.log('%c🔥 Admin Panel - Back4App', 'color: #ff00ff; font-size: 20px; font-weight: bold;');
    console.log('%c> Conectado a: parseapi.back4app.com', 'color: #00ff00;');
    </script>

</body>
</html>
