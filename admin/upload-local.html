<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Local - Con Videos</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px}
.box{border:3px solid #f0f;padding:20px;border-radius:15px;max-width:500px;margin:30px auto}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:#000;border:2px solid #0f0;color:#0f0}
button{width:100%;padding:15px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer;margin:10px 0}
.hidden{display:none}
.log{margin-top:10px;padding:10px;border:2px solid #333;font-size:12px;max-height:200px;overflow-y:auto}
.ok{color:#0f0}.err{color:#f00}.warn{color:#ff0}.info{color:#0af}
.video-info{background:#1a1a1a;padding:10px;margin:10px 0;border-radius:5px;border-left:3px solid #0af}
</style>
</head>
<body>

<div id="login" class="box">
<h1>🔐 Zona Restringida</h1>
<input type="password" id="p" placeholder="Código">
<button onclick="entrar()">ACCEDER</button>
</div>

<div id="panel" class="box hidden">
<h1>📁 Upload Local</h1>
<p style="color:#666;font-size:12px">Imágenes y videos cortos (< 3MB)</p>

<input type="file" id="file" accept="image/*,video/*">
<div id="videoInfo" class="video-info hidden"></div>

<select id="type">
<option value="image">📷 Imagen</option>
<option value="video">🎥 Video (15-30 seg)</option>
</select>

<textarea id="cap" placeholder="Descripción" rows="2"></textarea>

<select id="level">
<option value="1">🔥 Nivel 1</option>
<option value="2">🔥 Nivel 2</option>
<option value="3" selected>🔥 Nivel 3</option>
<option value="4">🔥🔥 Nivel 4</option>
<option value="5">🔥🔥 Nivel 5</option>
</select>

<input type="text" id="tags" placeholder="Tags (coma separados)">

<button onclick="subir()">💾 GUARDAR</button><button onclick="exportar()">📤 EXPORTAR BACKUP</button>
<button onclick="irGestion()" style="background:#00f;color:#fff">📋 GESTIONAR</button>
<button onclick="salir()" style="background:#f00;color:#fff">🚪 SALIR</button>

<div id="log" class="log hidden"></div>
</div>

<script>
function entrar(){if(document.getElementById('p').value==='patito123'){sessionStorage.setItem('ok','1');document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}else{alert('❌ Incorrecto');}}
function salir(){sessionStorage.removeItem('ok');location.reload();}
if(sessionStorage.getItem('ok')==='1'){document.getElementById('login').style.display='none';document.getElementById('panel').classList.remove('hidden');}

function log(m,t){var l=document.getElementById('log');l.classList.remove('hidden');l.innerHTML+='<div class="'+t+'">> '+m+'</div>';l.scrollTop=l.scrollHeight;}

function irGestion(){window.location.href='gestionar.html';}

// Detectar tipo de archivo
document.getElementById('file').addEventListener('change',function(e){
var file=e.target.files[0];
if(!file)return;

var videoInfo=document.getElementById('videoInfo');
var typeSelect=document.getElementById('type');

if(file.type.startsWith('video/')){
typeSelect.value='video';
var sizeMB=(file.size/1024/1024).toFixed(2);
var warn=sizeMB>3?'⚠️ GRANDE (>3MB)':'✅ Tamaño OK';
var color=sizeMB>3?'#f00':'#0f0';
videoInfo.innerHTML='<strong>📹 Video detectado:</strong><br>'+
'📊 Tamaño: <span style="color:'+color+'">'+sizeMB+' MB</span> '+warn+'<br>'+
'🎬 Tipo: '+file.type+'<br>'+
'⏱️ Recomendado: 15-30 segundos, < 3MB';
videoInfo.classList.remove('hidden');
}else if(file.type.startsWith('image/')){
typeSelect.value='image';
videoInfo.classList.add('hidden');
}
});

// Comprimir/convertir a base64
function processFile(file,maxSize=3*1024*1024){return new Promise((resolve,reject)=>{
if(file.size>maxSize){
var sizeMB=(file.size/1024/1024).toFixed(2);
if(confirm('⚠️ El archivo es grande ('+sizeMB+' MB)\n\nSe recomienda < 3MB.\n\n¿Continuar de todas formas?')){
// Proceder pero advertir
}
}

if(file.type.startsWith('image/')){var img=new Image(),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
img.onload=()=>{
var ratio=Math.min(800/img.width,1);
canvas.width=img.width*ratio;canvas.height=img.height*ratio;
ctx.drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL('image/jpeg',0.7));
};
img.onerror=reject;
img.src=URL.createObjectURL(file);
}else if(file.type.startsWith('video/')){
// Para videos, leer directo (sin compresión automática)
var reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
}else{
reject(new Error('Formato no soportado'));
}
});}

async function subir(){
var file=document.getElementById('file').files[0];
if(!file){log('❌ Selecciona un archivo','err');return;}

log('⏳ Procesando...','info');

try{
var dataUrl=await processFile(file);
var sizeMB=(dataUrl.length*2/1024/1024).toFixed(2);
log('📦 Tamaño final: '+sizeMB+' MB','info');

if(sizeMB>5){
log('⚠️ ADVERTENCIA: Ocupa mucho espacio','warn');
}

var item={
id:Date.now(),
type:document.getElementById('type').value,
url:dataUrl,
caption:document.getElementById('cap').value,
controversy_level:parseInt(document.getElementById('level').value),
tags:document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(t=>t),
is_active:true,
views_count:0,
createdAt:new Date().toISOString()
};

// Verificar espacio disponible
var key='controversial_local';
var items=JSON.parse(localStorage.getItem(key)||'[]');var currentSize=JSON.stringify(items).length*2;
var newSize=dataUrl.length*2;
var totalSize=currentSize+newSize;
var limit=5*1024*1024; // 5MB

if(totalSize>limit){
var usedMB=(currentSize/1024/1024).toFixed(2);
var needMB=(newSize/1024/1024).toFixed(2);
log('❌ Sin espacio','err');
log('Usado: '+usedMB+' MB, Necesitas: '+needMB+' MB','err');
log('💡 Borra contenido viejo o exporta backup','info');
return;
}

items.unshift(item);
localStorage.setItem(key,JSON.stringify(items));

log('✅ ¡Guardado exitosamente!','ok');
log('💡 Aparece en tu web inmediatamente','ok');
log('📊 Espacio usado: '+((totalSize/1024/1024).toFixed(2))+' MB','info');

document.getElementById('file').value='';
document.getElementById('cap').value='';
document.getElementById('tags').value='';
document.getElementById('videoInfo').classList.add('hidden');

}catch(e){
log('❌ Error: '+e.message,'err');
console.error(e);
}
}

function exportar(){
var key='controversial_local';
var items=JSON.parse(localStorage.getItem(key)||'[]');
if(items.length===0){log('⚠️ No hay datos para exportar','info');return;}
var blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download='backup-controversial-'+Date.now()+'.json';a.click();
log('📦 Backup descargado - Guárdalo en Drive/USB','ok');
}
</script>
</body>
</html>
