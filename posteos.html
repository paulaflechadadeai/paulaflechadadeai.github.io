<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Posteos · paulaflechadadeai</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --neon-pink: #ff00ff;
            --neon-blue: #00aaff;
            --bg-dark: #0a0a0a;
            --bg-darker: #000;
        }
        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            background: var(--bg-dark);
            color: var(--neon-green);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .window-header {
            border: 3px solid var(--neon-pink);
            padding: 15px 20px;
            margin-bottom: 20px;
            background: var(--bg-darker);
            box-shadow: 8px 8px 0 rgba(255, 0, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .window-title {
            font-size: 1.8em;
            color: var(--neon-pink);
            text-shadow: 2px 2px 0 var(--neon-blue);
        }
        .win-btn {
            background: black;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .win-btn:hover {
            background: var(--neon-green);
            color: black;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            border: 3px solid var(--neon-green);
            background: var(--bg-darker);
            padding: 15px;
            box-shadow: 5px 5px 0 rgba(0, 255, 0, 0.3);
        }
        .panel.pink {
            border-color: var(--neon-pink);
            box-shadow: 5px 5px 0 rgba(255, 0, 255, 0.3);
        }
        .panel.blue {
            border-color: var(--neon-blue);
            box-shadow: 5px 5px 0 rgba(0, 170, 255, 0.3);
        }
        .panel-header {
            border-bottom: 2px dashed currentColor;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post-list-item {
            border-left: 4px solid var(--neon-pink);
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 0, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .post-list-item:hover {
            background: rgba(255, 0, 255, 0.2);
            transform: translateX(5px);
        }
        .post-list-item .fecha {
            color: var(--neon-blue);
            font-size: 0.8em;
        }
        .post-list-item .titulo {
            color: var(--neon-pink);
            font-weight: bold;
        }
        .editor-area {
            min-height: 400px;
        }
        .post-content {
            border-top: 2px dashed var(--neon-pink);
            margin-top: 15px;
            padding-top: 15px;
        }
        .editor-form input,
        .editor-form textarea {
            width: 100%;
            background: black;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 1em;
        }
        .editor-form textarea {
            resize: vertical;
            min-height: 150px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn {
            background: black;
            border: 2px solid;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        .btn-pink {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        .btn-pink:hover {
            background: var(--neon-pink);
            color: black;
        }
        .btn-blue {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }
        .btn-blue:hover {
            background: var(--neon-blue);
            color: black;
        }
        .btn-green {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }
        .btn-green:hover {
            background: var(--neon-green);
            color: black;
        }
        .comments-section {
            margin-top: 30px;
            border-top: 3px double var(--neon-blue);
            padding-top: 20px;
        }
        .footer {
            margin-top: 40px;
            border-top: 2px dashed #444;
            padding-top: 20px;
            text-align: center;
            color: #888;
        }
        .hidden {
            display: none;
        }
        .status-indicator {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
            background: #238636;
            color: white;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--neon-blue);
        }
        .post-acciones {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="window-header">
        <div class="window-title">📁 ~/posteos</div>
        <div class="window-controls">
            <button class="win-btn" onclick="activarEditor()">✏️ NUEVO POST</button>
            <button class="win-btn" onclick="window.location.href='/'">🏠 INICIO</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel pink">
            <div class="panel-header">📋 ÍNDICE DE POSTS</div>
            <div id="listaPosts" class="post-list">
                <div class="loading">Cargando posts desde GitHub...</div>
            </div>
        </div>

        <div class="panel blue" id="panelDerecho">
            <div class="panel-header">👁️ VISTA PREVIA</div>
            <div id="vistaPrevia">
                <p style="color: var(--neon-blue); text-align: center;">Selecciona un post de la lista o crea uno nuevo.</p>
            </div>
        </div>
    </div>

    <div id="comentariosArea" class="comments-section hidden">
        <div class="panel-header" style="border-color: var(--neon-blue);">💬 COMENTARIOS (GISCUS)</div>
        <div id="comentariosGiscus"></div>
    </div>

    <div class="footer">
        <p>📍 Posteos · Datos en GitHub Issues · Sin sponsors · <span id="fecha-actual"></span></p>
    </div>
</div>

<!-- Modal editor (solo visible tras autenticación) -->
<div id="panelEditor" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center;">
    <div class="panel blue" style="max-width: 600px; width: 90%; margin: auto; position: relative; top: 50%; transform: translateY(-50%);">
        <div class="panel-header">✏️ NUEVO POST</div>
        <div class="editor-form">
            <input type="text" id="editTitulo" placeholder="Título del post">
            <textarea id="editContenido" placeholder="Escribe tu post aquí... (puedes usar HTML)"></textarea>
            <input type="hidden" id="editNumber" value="">
            <div class="button-group">
                <button class="btn btn-pink" onclick="guardarPost()">🚀 CREAR / EDITAR EN GITHUB</button>
                <button class="btn btn-blue" onclick="cancelarEdicion()">✖ CANCELAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURACIÓN - CLAVE OFUSCADA "patito123"
    // ============================================================
    const CLAVE_OFUSCADA = String.fromCharCode(112, 97, 116, 105, 116, 111, 49, 50, 51);
    const REPO_OWNER = "paulaflechadadeai";
    const REPO_NAME = "paulaflechadadeai.github.io";
    const ETIQUETA_PRINCIPAL = "posteos";
    
    let posts = [];           // lista de issues abiertos
    let editorActivo = false;
    let postActual = null;    // número del post que se está viendo

    // ========== FUNCIONES AUXILIARES ==========
    function formatearFecha(isoDate) {
        const fecha = new Date(isoDate);
        return `${fecha.getDate().toString().padStart(2,'0')}/${(fecha.getMonth()+1).toString().padStart(2,'0')}/${fecha.getFullYear()} ${fecha.getHours().toString().padStart(2,'0')}:${fecha.getMinutes().toString().padStart(2,'0')}`;
    }

    // ========== CARGAR POSTS DESDE GITHUB ==========
    async function cargarPosts() {
        const contenedorLista = document.getElementById('listaPosts');
        contenedorLista.innerHTML = '<div class="loading">Cargando posts desde GitHub...</div>';
        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=open&labels=${ETIQUETA_PRINCIPAL}&per_page=100`;
            const res = await fetch(url, { headers: { Accept: "application/vnd.github.v3+json" } });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const issues = await res.json();
            const soloIssues = issues.filter(issue => !issue.pull_request);
            
            posts = soloIssues.map(issue => {
                // Extraer contenido del cuerpo: asumimos que el contenido empieza después de "CONTENIDO:\n"
                let cuerpo = issue.body || "";
                let contenido = "";
                const match = cuerpo.match(/CONTENIDO:\s*([\s\S]*)/i);
                if (match) {
                    contenido = match[1].trim();
                    // Eliminar el separador final si existe
                    contenido = contenido.replace(/\n---\n.*$/, '').trim();
                } else {
                    // Fallback: todo el cuerpo
                    contenido = cuerpo.replace(/\n---\n.*$/, '').trim();
                }
                return {
                    number: issue.number,
                    titulo: issue.title,
                    contenido: contenido,
                    fecha: formatearFecha(issue.created_at),
                    timestamp: new Date(issue.created_at).getTime(),
                    url: issue.html_url
                };
            });
            posts.sort((a,b) => b.timestamp - a.timestamp);
            mostrarListaPosts();
            // Si había un post seleccionado, intentar mostrarlo de nuevo
            if (postActual && posts.find(p => p.number === postActual)) {
                verPost(postActual);
            } else if (posts.length > 0 && !postActual) {
                verPost(posts[0].number);
            } else if (posts.length === 0) {
                document.getElementById('vistaPrevia').innerHTML = '<p style="color: var(--neon-blue); text-align: center;">📭 No hay posts. Crea el primero con el modo editor.</p>';
                document.getElementById('comentariosArea').classList.add('hidden');
            }
        } catch (error) {
            console.error(error);
            contenedorLista.innerHTML = `<p style="color: #ff5555;">⚠️ Error al conectar con GitHub. Verifica que el repositorio sea público y la etiqueta '${ETIQUETA_PRINCIPAL}' exista.</p>`;
        }
    }

    function mostrarListaPosts() {
        const contenedor = document.getElementById('listaPosts');
        if (posts.length === 0) {
            contenedor.innerHTML = '<div style="color: var(--neon-blue); text-align: center;">📭 No hay posts aún</div>';
            return;
        }
        let html = '';
        posts.forEach(p => {
            html += `
                <div class="post-list-item" onclick="verPost(${p.number})">
                    <div class="fecha">📅 ${p.fecha}</div>
                    <div class="titulo">${escapeHtml(p.titulo)}</div>
                </div>
            `;
        });
        contenedor.innerHTML = html;
    }

    function escapeHtml(texto) {
        if (!texto) return '';
        const div = document.createElement('div');
        div.textContent = texto;
        return div.innerHTML;
    }

    // ========== MOSTRAR POST SELECCIONADO ==========
    function verPost(number) {
        const post = posts.find(p => p.number === number);
        if (!post) return;
        postActual = post.number;
        
        document.getElementById('vistaPrevia').innerHTML = `
            <div style="border-left: 4px solid var(--neon-pink); padding-left: 15px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap;">
                    <span style="color: var(--neon-pink); font-weight: bold; font-size: 1.3em;">📌 ${escapeHtml(post.titulo)}</span>
                    <span style="color: var(--neon-blue);">${post.fecha}</span>
                </div>
                <div class="post-content">${post.contenido}</div>
                ${editorActivo ? `
                    <div class="post-acciones">
                        <button onclick="editarPost(${post.number})" class="btn btn-blue">✏️ EDITAR</button>
                        <button onclick="cerrarPost(${post.number})" class="btn btn-pink">🗑️ CERRAR POST</button>
                    </div>
                ` : ''}
            </div>
        `;
        
        document.getElementById('comentariosArea').classList.remove('hidden');
        cargarGiscus(post.number);
    }
    
    // ========== GISCUS ==========
    function cargarGiscus(postNumber) {
        const contenedor = document.getElementById('comentariosGiscus');
        contenedor.innerHTML = '';
        const script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.setAttribute('data-repo', `${REPO_OWNER}/${REPO_NAME}`);
        script.setAttribute('data-repo-id', 'R_kgDORN19Og');
        script.setAttribute('data-category', 'Announcements');
        script.setAttribute('data-category-id', 'DIC_kwDORN19Os4C2Nsz');
        script.setAttribute('data-mapping', 'specific');
        script.setAttribute('data-term', `posteos-${postNumber}`);
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'bottom');
        script.setAttribute('data-theme', 'dark');
        script.setAttribute('data-lang', 'es');
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;
        contenedor.appendChild(script);
    }

    // ========== ACCIONES DEL EDITOR (redirección a GitHub) ==========
    function guardarPost() {
        const numero = document.getElementById('editNumber').value;
        let titulo = document.getElementById('editTitulo').value.trim();
        let contenido = document.getElementById('editContenido').value.trim();
        if (!titulo || !contenido) {
            alert("El título y el contenido son obligatorios");
            return;
        }
        
        // Construir el cuerpo del issue
        const cuerpo = `CONTENIDO:\n${contenido}\n\n---\n*Post creado desde posteos*`;
        const labels = ETIQUETA_PRINCIPAL;
        
        let url;
        if (numero) {
            url = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/${numero}/edit`;
            alert("Serás redirigido a GitHub para editar el issue. Después de guardar, vuelve y recarga la página.");
        } else {
            const titleEnc = encodeURIComponent(titulo);
            const bodyEnc = encodeURIComponent(cuerpo);
            const labelsEnc = encodeURIComponent(labels);
            url = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${titleEnc}&body=${bodyEnc}&labels=${labelsEnc}`;
        }
        window.open(url, '_blank');
        
        cancelarEdicion();
        setTimeout(() => {
            if (confirm("¿Ya has creado/editado el issue? Recarga la lista de posts.")) {
                cargarPosts();
            }
        }, 15000);
    }
    
    function editarPost(number) {
        const post = posts.find(p => p.number === number);
        if (!post) return;
        document.getElementById('editNumber').value = post.number;
        document.getElementById('editTitulo').value = post.titulo;
        document.getElementById('editContenido').value = post.contenido;
        document.getElementById('panelEditor').style.display = 'flex';
        // No ocultamos el editor, pero ajustamos el texto del botón
        const btn = document.querySelector('#panelEditor .btn-pink');
        if (btn) btn.textContent = '✏️ EDITAR EN GITHUB';
        else document.querySelector('#panelEditor button.btn-pink').textContent = '✏️ EDITAR EN GITHUB';
    }
    
    function cerrarPost(number) {
        if (!confirm("¿Cerrar este post? Se moverá a 'closed' y dejará de aparecer en la lista.")) return;
        const url = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/${number}`;
        alert(`Ve al issue en GitHub y haz clic en "Close issue".\n${url}`);
        window.open(url, '_blank');
        setTimeout(() => {
            if (confirm("¿Ya cerraste el issue? Recarga la lista de posts.")) {
                cargarPosts();
                if (postActual === number) {
                    document.getElementById('vistaPrevia').innerHTML = '<p style="color: var(--neon-blue); text-align: center;">El post ha sido cerrado. Selecciona otro.</p>';
                    document.getElementById('comentariosArea').classList.add('hidden');
                    postActual = null;
                }
            }
        }, 10000);
    }
    
    // ========== AUTENTICACIÓN Y MODO EDITOR ==========
    function activarEditor() {
        const clave = prompt("🔑 Clave de editor:");
        if (clave === CLAVE_OFUSCADA) {
            editorActivo = true;
            // Mostrar modal para nuevo post
            document.getElementById('editNumber').value = '';
            document.getElementById('editTitulo').value = '';
            document.getElementById('editContenido').value = '';
            document.getElementById('panelEditor').style.display = 'flex';
            // Cambiar texto del botón a "CREAR EN GITHUB" si es nuevo
            const btn = document.querySelector('#panelEditor .btn-pink');
            if (btn) btn.textContent = '🚀 CREAR / EDITAR EN GITHUB';
            // Recargar vista para que aparezcan botones de editar/cerrar en los posts
            if (postActual) verPost(postActual);
            else if (posts.length > 0) verPost(posts[0].number);
        } else if (clave !== null) {
            alert("❌ Clave incorrecta");
        }
    }
    
    function cancelarEdicion() {
        editorActivo = false;
        document.getElementById('panelEditor').style.display = 'none';
        // Recargar vista para ocultar botones de edición si es necesario
        if (postActual) verPost(postActual);
        else if (posts.length > 0) verPost(posts[0].number);
        else {
            document.getElementById('vistaPrevia').innerHTML = '<p style="color: var(--neon-blue); text-align: center;">Selecciona un post de la lista o crea uno nuevo.</p>';
            document.getElementById('comentariosArea').classList.add('hidden');
        }
    }
    
    // Inicializar
    cargarPosts();
    document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-CL');
</script>
</body>
                    </html>
