<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Subir Imagen · observatorio</title>
    <style>
        /* Mismos estilos que tu scan-ias.html, los pegas aquí */
        /* (Copia el bloque <style> de scan-ias.html completo) */
    </style>
</head>
<body>
    <div class="header">
        <h1 class="glitch-title">~/observatorio/imagen $</h1>
        <p class="subheader">> Subir imagen (máx 2MB)</p>
    </div>

    <div class="volver">
        <a href="/">← INICIO</a>
    </div>

    <div class="terminal">
        <form onsubmit="event.preventDefault(); subirImagen();">
            <label>📌 TÍTULO:</label>
            <input type="text" id="titulo" placeholder="Describe la imagen" required>

            <label>📝 DESCRIPCIÓN (opcional):</label>
            <textarea id="descripcion" rows="2" placeholder="Contexto..."></textarea>

            <label>🖼️ SELECCIONAR IMAGEN:</label>
            <input type="file" id="archivo" accept="image/jpeg,image/png,image/gif,image/webp" onchange="previsualizar(this)" required>
            <small style="color: var(--neon-blue);">JPG, PNG, GIF, WEBP · Máx 2MB</small>

            <div id="vistaPrevia" class="preview-container" style="display: none;">
                <img id="imgPreview" style="max-width:200px;">
                <p><button type="button" onclick="quitarImagen()" class="btn-danger" style="padding:5px 10px;">✖ QUITAR</button></p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-success">🚀 SUBIR A GITHUB</button>
                <button type="button" onclick="history.back()" class="btn-secondary">↩ CANCELAR</button>
            </div>
        </form>
    </div>

    <script>
        const GITHUB_USER = 'paulaflechadadeai';
        const GITHUB_REPO = 'paulaflechadadeai.github.io';
        let archivoSeleccionado = null;

        function previsualizar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validar tamaño (2MB)
                if (file.size > 2 * 1024 * 1024) {
                    alert("❌ La imagen debe ser menor de 2MB");
                    input.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    archivoSeleccionado = {
                        datos: e.target.result,
                        nombre: file.name,
                        tipo: 'imagen'
                    };
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('vistaPrevia').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function quitarImagen() {
            archivoSeleccionado = null;
            document.getElementById('vistaPrevia').style.display = 'none';
            document.getElementById('archivo').value = '';
        }

        function subirImagen() {
            const titulo = document.getElementById('titulo').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();

            if (!titulo) {
                alert("⚠️ El título es obligatorio");
                return;
            }
            if (!archivoSeleccionado) {
                alert("⚠️ Selecciona una imagen");
                return;
            }

            const cuerpo = `${descripcion || 'Sin descripción'}\n\n![${titulo}](URL_DE_LA_IMAGEN_AQUÍ)\n\n---\n*Subido desde observatorio-imagen*`;

            window.open(
                `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(titulo)}&body=${encodeURIComponent(cuerpo)}&labels=imagen,observatorio`,
                '_blank'
            );

            // Resetear formulario
            document.getElementById('titulo').value = '';
            document.getElementById('descripcion').value = '';
            quitarImagen();
            
            alert("✅ Se abrió GitHub. Arrastra la imagen al issue y publícalo.");
        }
    </script>
</body>
</html>
