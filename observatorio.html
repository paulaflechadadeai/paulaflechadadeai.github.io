<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio IA - Terminal Feed</title>
    <style>
        /* Estilo general de la terminal */
        body {
            background: #0a0e1a;
            font-family: 'Courier New', 'Fira Code', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .terminal {
            background: #0c0f1c;
            border-radius: 12px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
        }
        .terminal-header {
            background: #1a1e2c;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2d3348;
        }
        .window-buttons {
            display: flex;
            gap: 8px;
        }
        .window-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }
        .terminal-title {
            color: #b9c0e0;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .terminal-content {
            padding: 20px;
            color: #c3e88d;
            font-size: 0.9rem;
            line-height: 1.5;
            overflow-y: auto;
            max-height: 70vh;
        }
        .terminal-content::-webkit-scrollbar {
            width: 8px;
            background: #1a1e2c;
        }
        .terminal-content::-webkit-scrollbar-thumb {
            background: #3b3f5c;
            border-radius: 4px;
        }
        .prompt {
            color: #7aa2f7;
            margin-right: 10px;
        }
        .command {
            color: #e0af68;
        }
        .output-line {
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .repo-line {
            margin: 10px 0;
            padding: 8px 12px;
            border-left: 3px solid #7aa2f7;
            background: rgba(122, 162, 247, 0.05);
            transition: 0.2s;
        }
        .repo-line:hover {
            background: rgba(122, 162, 247, 0.12);
            border-left-color: #c3e88d;
        }
        .repo-name {
            color: #ff9e64;
            font-weight: bold;
        }
        .repo-stars {
            color: #ffd966;
            font-size: 0.8rem;
        }
        .repo-lang {
            color: #9ece6a;
            font-size: 0.8rem;
        }
        .repo-desc {
            color: #bbbbdd;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #c3e88d;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .loading {
            color: #bbbbdd;
            font-style: italic;
        }
        button.refresh-btn {
            background: #2d3348;
            border: none;
            color: #c3e88d;
            font-family: monospace;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: auto;
            font-size: 0.8rem;
        }
        button.refresh-btn:hover {
            background: #3b3f5c;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #555c7a;
            border-top: 1px solid #1a1e2c;
            padding: 12px;
        }
        a {
            color: #7aa2f7;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="terminal">
    <div class="terminal-header">
        <div class="window-buttons">
            <div class="window-btn close"></div>
            <div class="window-btn minimize"></div>
            <div class="window-btn maximize"></div>
        </div>
        <div class="terminal-title">observatorio@ai-feed:~/repositorios</div>
        <button class="refresh-btn" id="refreshBtn">⟳ actualizar</button>
    </div>
    <div class="terminal-content" id="terminalOutput">
        <div class="output-line">
            <span class="prompt">$</span>
            <span class="command"> ./scanner --tag=ai --limit=15 --sort=stars</span>
        </div>
        <div class="output-line loading" id="loadingMsg">
            <span class="prompt">></span> Conectando con GitHub API...
        </div>
    </div>
    <div class="footer">
        🔍 feed en tiempo real | repositorios con "ai" | datos vía GitHub API
    </div>
</div>

<script>
    const terminalOutput = document.getElementById('terminalOutput');
    const refreshBtn = document.getElementById('refreshBtn');
    let currentRepos = [];

    // Limpiar y mostrar loading
    function showLoading() {
        // Conservamos solo la primera línea (el comando)
        const firstLine = terminalOutput.children[0];
        terminalOutput.innerHTML = '';
        terminalOutput.appendChild(firstLine);
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'output-line loading';
        loadingDiv.id = 'loadingMsg';
        loadingDiv.innerHTML = '<span class="prompt">></span> Conectando con GitHub API...';
        terminalOutput.appendChild(loadingDiv);
    }

    // Formatear un repositorio como línea de terminal
    function formatRepo(repo) {
        const stars = repo.stargazers_count.toLocaleString();
        const lang = repo.language || 'unknown';
        const desc = repo.description ? repo.description.substring(0, 120) : 'Sin descripción';
        const url = repo.html_url;

        return `
            <div class="repo-line">
                <div>
                    <span class="repo-name">📁 ${repo.full_name}</span>
                    <span class="repo-stars">⭐ ${stars}</span>
                    <span class="repo-lang"> | 🖥️ ${lang}</span>
                </div>
                <div class="repo-desc">${escapeHtml(desc)}</div>
                <div class="repo-desc" style="font-size:0.7rem">🔗 <a href="${url}" target="_blank">${url}</a></div>
            </div>
        `;
    }

    // Escapar HTML para evitar inyecciones
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Mostrar repos en el terminal
    function displayRepos(repos) {
        // Eliminar el mensaje de loading si existe
        const loadingMsg = document.getElementById('loadingMsg');
        if (loadingMsg) loadingMsg.remove();

        // Eliminar líneas que no sean la primera (comando)
        while (terminalOutput.children.length > 1) {
            terminalOutput.removeChild(terminalOutput.lastChild);
        }

        // Añadir cabecera de resultados
        const resultHeader = document.createElement('div');
        resultHeader.className = 'output-line';
        resultHeader.innerHTML = `<span class="prompt">></span> ${repos.length} repositorios encontrados con el tag "ai" (ordenados por ⭐)`;
        terminalOutput.appendChild(resultHeader);

        // Añadir cada repositorio
        repos.forEach(repo => {
            const line = document.createElement('div');
            line.className = 'output-line';
            line.innerHTML = formatRepo(repo);
            terminalOutput.appendChild(line);
        });

        // Añadir línea final con timestamp
        const timestamp = new Date().toLocaleString();
        const footerLine = document.createElement('div');
        footerLine.className = 'output-line';
        footerLine.innerHTML = `<span class="prompt">></span> Última actualización: ${timestamp} | <span class="command">./feed --active</span>`;
        terminalOutput.appendChild(footerLine);
    }

    // Obtener datos de GitHub API
    async function fetchGitHubRepos() {
        showLoading();
        try {
            // Búsqueda: repositorios con "ai" en nombre, descripción o readme
            // Ordenamos por estrellas para mostrar los más populares primero
            const url = 'https://api.github.com/search/repositories?q=ai&sort=stars&order=desc&per_page=15';
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Error HTTP: ${response.status}`);
            }
            const data = await response.json();
            if (!data.items) throw new Error('Formato inesperado');
            currentRepos = data.items;
            displayRepos(currentRepos);
        } catch (error) {
            console.error(error);
            const loadingMsg = document.getElementById('loadingMsg');
            if (loadingMsg) {
                loadingMsg.innerHTML = `<span class="prompt">></span> ❌ Error: ${error.message}. Reintentando...`;
                setTimeout(fetchGitHubRepos, 5000);
            } else {
                const errorLine = document.createElement('div');
                errorLine.className = 'output-line';
                errorLine.innerHTML = `<span class="prompt">></span> ❌ Error: ${error.message}. Intenta de nuevo más tarde.`;
                terminalOutput.appendChild(errorLine);
            }
        }
    }

    // Evento para refrescar manualmente
    refreshBtn.addEventListener('click', () => {
        fetchGitHubRepos();
    });

    // Cargar al inicio
    fetchGitHubRepos();
</script>
</body>
</html>
