<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Subir Video · observatorio</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #0aff0a;
            --neon-red: #ff003c;
            --neon-yellow: #ffee00;
            --neon-purple: #bd00ff;
            --bg-dark: #0a0a0f;
            --bg-terminal: #0d1117;
            --border: #30363d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 20px;
        }
        
        .glitch-title {
            font-size: 2.5rem;
            color: var(--neon-blue);
            text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-green);
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-green); }
            92% { text-shadow: -2px 0 var(--neon-red), 2px 0 var(--neon-green); }
            94% { text-shadow: 2px 0 var(--neon-green), -2px 0 var(--neon-red); }
        }
        
        .subheader {
            color: var(--neon-green);
            margin-top: 10px;
            font-size: 1.1rem;
        }
        
        .volver {
            margin-bottom: 20px;
        }
        
        .volver a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .volver a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }
        
        .terminal {
            background: var(--bg-terminal);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        
        label {
            display: block;
            color: var(--neon-yellow);
            margin: 15px 0 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            background: #010409;
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: block;
            background: linear-gradient(45deg, #21262d, #30363d);
            border: 2px dashed var(--neon-blue);
            color: var(--neon-blue);
            padding: 40px 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }
        
        .file-label:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .file-label::before {
            content: "📁 ";
            font-size: 2rem;
        }
        
        small {
            color: var(--neon-blue);
            display: block;
            margin-top: 5px;
        }
        
        .preview-container {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        
        video {
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }
        
        .btn-success, .btn-secondary, .btn-danger, .btn-refresh {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #238636, #2ea043);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(35, 134, 54, 0.5);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #6e7681, #8b949e);
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(110, 118, 129, 0.5);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #da3633, #f85149);
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(218, 54, 51, 0.5);
        }
        
        .btn-refresh {
            background: linear-gradient(45deg, #00f3ff, #00ff88);
            color: #0a0a0f;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.5);
        }
        
        .info-box {
            background: rgba(255, 238, 0, 0.1);
            border-left: 3px solid var(--neon-yellow);
            padding: 10px 15px;
            margin: 15px 0;
            border-radius: 0 6px 6px 0;
        }
        
        .info-box p {
            color: var(--neon-yellow);
            font-size: 0.9rem;
        }
        
        .qid-input {
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        /* Sección de videos existentes */
        .existing-videos {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            color: var(--neon-blue);
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        .loading {
            text-align: center;
            color: var(--neon-blue);
            padding: 20px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .video-card {
            background: var(--bg-terminal);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }
        
        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            z-index: 1;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 243, 255, 0.2);
            border-color: var(--neon-blue);
        }
        
        .video-player-container {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }
        
        .video-player-container video,
        .video-player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .play-overlay:hover {
            background: rgba(0, 0, 0, 0.3);
        }
        
        .play-button {
            width: 70px;
            height: 70px;
            background: rgba(0, 243, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #0a0a0f;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
        }
        
        .play-overlay:hover .play-button {
            transform: scale(1.1);
            background: var(--neon-blue);
        }
        
        .video-content {
            padding: 20px;
        }
        
        .video-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .video-icon {
            font-size: 1.5rem;
        }
        
        .video-title {
            color: var(--neon-green);
            font-size: 1.1rem;
            font-weight: bold;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .video-meta {
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .video-description {
            color: #c9d1d9;
            font-size: 0.9rem;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-bottom: 12px;
        }
        
        .video-platform {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .platform-youtube {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .platform-vimeo {
            background: rgba(26, 183, 234, 0.2);
            color: #1ab7ea;
            border: 1px solid #1ab7ea;
        }
        
        .platform-local {
            background: rgba(0, 243, 255, 0.2);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
        }
        
        .labels {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .label {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }
        
        .label.qid {
            background: rgba(255, 238, 0, 0.1);
            color: var(--neon-yellow);
            border-color: rgba(255, 238, 0, 0.3);
        }
        
        .video-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .video-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid;
        }
        
        .video-btn-primary {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            border-color: var(--neon-blue);
        }
        
        .video-btn-primary:hover {
            background: var(--neon-blue);
            color: #0a0a0f;
        }
        
        .video-btn-secondary {
            background: rgba(255, 0, 60, 0.1);
            color: var(--neon-red);
            border-color: var(--neon-red);
        }
        
        .video-btn-secondary:hover {
            background: var(--neon-red);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        
        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .error-message {
            background: rgba(218, 54, 51, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        /* Modal para video fullscreen */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
        }
        
        .video-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-modal-content {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }
        
        .video-modal-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .video-modal-player video,
        .video-modal-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .video-modal-close:hover {
            color: var(--neon-red);
        }
        
        .video-modal-info {
            margin-top: 20px;
            text-align: center;
        }
        
        .video-modal-title {
            color: var(--neon-blue);
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .video-modal-meta {
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="glitch-title">~/observatorio/video $</h1>
        <p class="subheader">> Subir video (máx 50MB)</p>
    </div>

    <div class="volver">
        <a href="/">← INICIO</a>
    </div>

    <div class="terminal">
        <form onsubmit="event.preventDefault(); subirVideo();">
            <label>📌 TÍTULO:</label>
            <input type="text" id="titulo" placeholder="Título del video" required>

            <label>✍️ AUTOR/CREADOR:</label>
            <input type="text" id="autor" placeholder="Quién creó este video">

            <label>🆔 QID (Wikidata):</label>
            <input type="text" id="qid" class="qid-input" placeholder="Q123456" pattern="Q[0-9]+" title="Formato: Q seguido de números (ej: Q123456)">
            <small>Identificador de Wikidata (opcional)</small>

            <label>📝 DESCRIPCIÓN (opcional):</label>
            <textarea id="descripcion" rows="2" placeholder="Contexto del video..."></textarea>

            <label>📂 TIPO DE VIDEO:</label>
            <select id="tipoVideo">
                <option value="tutorial">📚 Tutorial/Educativo</option>
                <option value="documental">🎥 Documental</option>
                <option value="entrevista">🎤 Entrevista</option>
                <option value="gameplay">🎮 Gameplay</option>
                <option value="review">⭐ Reseña/Review</option>
                <option value="vlog">📹 Vlog/Personal</option>
                <option value="musica">🎵 Música/Performance</option>
                <option value="otro">🔧 Otro</option>
            </select>

            <label>🔗 URL EXTERNA (YouTube/Vimeo):</label>
            <input type="url" id="urlExterna" placeholder="https://youtube.com/watch?v=...">
            
            <div class="info-box">
                <p>💡 Tip: Si el video está en YouTube/Vimeo, pega la URL arriba. Para archivos locales, usa el selector debajo.</p>
            </div>

            <label>🎬 SELECCIONAR ARCHIVO:</label>
            <label for="archivo" class="file-label" id="fileLabel">
                Haz clic para seleccionar video<br>
                <small style="color: #8b949e; margin-top: 10px;">o arrastra aquí</small>
            </label>
            <input type="file" id="archivo" accept="video/mp4,video/webm,video/ogg,video/quicktime" onchange="previsualizar(this)">
            <small>MP4, WEBM, OGG, MOV · Máx 50MB</small>

            <div id="vistaPrevia" class="preview-container" style="display: none;">
                <video id="videoPreview" controls></video>
                <p style="margin-top: 10px;">
                    <span id="fileInfo" style="color: var(--neon-green);"></span>
                </p>
                <p><button type="button" onclick="quitarVideo()" class="btn-danger">✖ QUITAR</button></p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-success">🚀 SUBIR A GITHUB</button>
                <button type="button" onclick="history.back()" class="btn-secondary">↩ CANCELAR</button>
            </div>
        </form>
    </div>

    <!-- Sección de videos existentes -->
    <div class="existing-videos">
        <h2 class="section-title">🎬 Biblioteca de Videos</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="cargarVideosExistentes()" class="btn-refresh">🔄 Actualizar Biblioteca</button>
        </div>
        <div id="videosContainer">
            <div class="loading">⏳ Cargando videos desde GitHub...</div>
        </div>
    </div>

    <!-- Modal para video fullscreen -->
    <div id="videoModal" class="video-modal" onclick="cerrarVideoModal(event)">
        <div class="video-modal-content" onclick="event.stopPropagation()">
            <button class="video-modal-close" onclick="cerrarVideoModal()">&times;</button>
            <div class="video-modal-player" id="modalPlayer">
                <!-- Video o iframe se inserta aquí -->
            </div>
            <div class="video-modal-info">
                <div class="video-modal-title" id="modalTitle"></div>
                <div class="video-modal-meta" id="modalMeta"></div>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'paulaflechadadeai';
        const GITHUB_REPO = 'paulaflechadadeai.github.io';
        let archivoSeleccionado = null;
        let videosData = [];

        // Cargar videos existentes al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            cargarVideosExistentes();
        });

        function previsualizar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Validar tamaño (50MB)
                if (file.size > 50 * 1024 * 1024) {
                    alert("❌ El video debe ser menor de 50MB");
                    input.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    archivoSeleccionado = {
                        datos: e.target.result,
                        nombre: file.name,
                        tipo: 'video',
                        tamaño: (file.size / (1024 * 1024)).toFixed(2)
                    };
                    
                    const video = document.getElementById('videoPreview');
                    video.src = e.target.result;
                    document.getElementById('fileInfo').textContent = `📊 ${archivoSeleccionado.nombre} (${archivoSeleccionado.tamaño} MB)`;
                    document.getElementById('vistaPrevia').style.display = 'block';
                    document.getElementById('fileLabel').style.borderColor = 'var(--neon-green)';
                };
                reader.readAsDataURL(file);
            }
        }

        function quitarVideo() {
            archivoSeleccionado = null;
            document.getElementById('vistaPrevia').style.display = 'none';
            document.getElementById('archivo').value = '';
            document.getElementById('fileLabel').style.borderColor = 'var(--neon-blue)';
        }

        function subirVideo() {
            const titulo = document.getElementById('titulo').value.trim();
            const autor = document.getElementById('autor').value.trim();
            const qid = document.getElementById('qid').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const tipoVideo = document.getElementById('tipoVideo').value;
            const urlExterna = document.getElementById('urlExterna').value.trim();

            if (!titulo) {
                alert("⚠️ El título es obligatorio");
                return;
            }

            const tiposEmoji = {
                'tutorial': '📚',
                'documental': '🎥',
                'entrevista': '🎤',
                'gameplay': '🎮',
                'review': '⭐',
                'vlog': '📹',
                'musica': '🎵',
                'otro': '🔧'
            };

            let cuerpo = '';
            
            cuerpo += `${tiposEmoji[tipoVideo] || '🎬'} **Tipo:** ${tipoVideo}\n`;
            if (autor) cuerpo += `✍️ **Autor:** ${autor}\n`;
            if (qid) cuerpo += `🆔 **QID:** [${qid}](https://www.wikidata.org/wiki/${qid})\n`;
            cuerpo += `\n${descripcion || 'Sin descripción'}\n\n`;
            
            if (urlExterna) {
                cuerpo += `🎬 **Video:** [Ver en línea](${urlExterna})\n\n`;
                
                // Añadir thumbnail de YouTube si aplica
                if (urlExterna.includes('youtube.com') || urlExterna.includes('youtu.be')) {
                    const videoId = extraerYouTubeId(urlExterna);
                    if (videoId) {
                        cuerpo += `[![${titulo}](https://img.youtube.com/vi/${videoId}/0.jpg)](${urlExterna})\n\n`;
                    }
                }
            } else if (archivoSeleccionado) {
                cuerpo += `🎬 **Archivo:** ${archivoSeleccionado.nombre} (${archivoSeleccionado.tamaño} MB)\n\n`;
                cuerpo += `⬆️ **Acción requerida:** Arrastra el archivo al issue para subirlo\n\n`;
            } else {
                alert("⚠️ Proporciona una URL externa o selecciona un archivo de video");
                return;
            }

            cuerpo += `---\n*Subido desde observatorio-video*`;

            let labels = `video,${tipoVideo},observatorio`;

            window.open(
                `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/issues/new?title=${encodeURIComponent('🎬 ' + titulo)}&body=${encodeURIComponent(cuerpo)}&labels=${encodeURIComponent(labels)}`,
                '_blank'
            );

            // Resetear formulario
            document.getElementById('titulo').value = '';
            document.getElementById('autor').value = '';
            document.getElementById('qid').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('urlExterna').value = '';
            document.getElementById('tipoVideo').value = 'tutorial';
            quitarVideo();
            
            alert("✅ Se abrió GitHub. Si subiste un archivo, arrástralo al issue y publícalo.");
        }

        // Función para cargar videos existentes
        async function cargarVideosExistentes() {
            const container = document.getElementById('videosContainer');
            container.innerHTML = '<div class="loading">⏳ Cargando videos desde GitHub...</div>';

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?labels=video&state=all&per_page=30`
                );
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🎬</div>
                            <p>No hay videos registrados aún.</p>
                            <p style="font-size: 0.9rem; margin-top: 10px;">¡Sé el primero en subir uno!</p>
                        </div>
                    `;
                    return;
                }

                // Procesar videos
                videosData = issues.map(issue => {
                    const videoInfo = extraerInfoVideo(issue);
                    return {
                        issue: issue,
                        info: videoInfo
                    };
                }).filter(item => item.info.tieneVideo);

                if (videosData.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🎥</div>
                            <p>No se encontraron videos válidos.</p>
                        </div>
                    `;
                    return;
                }

                const cardsHTML = videosData.map((item, index) => 
                    crearVideoCard(item.info, index)
                ).join('');
                
                container.innerHTML = `<div class="video-grid">${cardsHTML}</div>`;
                
            } catch (error) {
                console.error('Error al cargar videos:', error);
                container.innerHTML = `
                    <div class="error-message">
                        ❌ Error al cargar los videos: ${error.message}<br>
                        <small>Verifica tu conexión o que el repositorio sea público</small>
                    </div>
                `;
            }
        }

        function extraerInfoVideo(issue) {
            const body = issue.body || '';
            const title = issue.title.replace('🎬 ', '');
            
            // Extraer metadatos
            const tipoMatch = body.match(/\*\*Tipo:\*\*\s*(\w+)/);
            const autorMatch = body.match(/\*\*Autor:\*\*\s*([^\n]+)/);
            const qidMatch = body.match(/\*\*QID:\*\*\s*\[?(Q\d+)\]?/);
            
            const tipo = tipoMatch ? tipoMatch[1] : 'otro';
            const autor = autorMatch ? autorMatch[1].trim() : null;
            const qid = qidMatch ? qidMatch[1] : null;
            
            // Extraer descripción
            let descripcion = '';
            const descMatch = body.match(/\n\n([\s\S]*?)(?=\n\n🎬|\n\n---|$)/);
            if (descMatch) {
                descripcion = descMatch[1].trim();
            }
            
            // Detectar tipo de video y URL
            let videoUrl = null;
            let platform = 'local';
            let embedUrl = null;
            let thumbnail = null;
            
            // Buscar URL de YouTube
            const youtubeMatch = body.match(/https:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (youtubeMatch) {
                videoUrl = youtubeMatch[0];
                platform = 'youtube';
                const videoId = youtubeMatch[1];
                embedUrl = `https://www.youtube.com/embed/${videoId}`;
                thumbnail = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            }
            
            // Buscar URL de Vimeo
            const vimeoMatch = body.match(/https:\/\/(?:www\.)?vimeo\.com\/(\d+)/);
            if (vimeoMatch) {
                videoUrl = vimeoMatch[0];
                platform = 'vimeo';
                const videoId = vimeoMatch[1];
                embedUrl = `https://player.vimeo.com/video/${videoId}`;
                thumbnail = null; // Vimeo requiere API para thumbnails
            }
            
            // Buscar archivo de video adjunto
            const assetMatch = body.match(/https:\/\/github\.com\/user-attachments\/assets\/[a-zA-Z0-9-]+/);
            if (assetMatch && !videoUrl) {
                videoUrl = assetMatch[0];
                platform = 'local';
                embedUrl = null;
                thumbnail = null;
            }
            
            // Buscar URL directa de video
            const directMatch = body.match(/(https:\/\/[^\s]+\.(?:mp4|webm|ogg))/i);
            if (directMatch && !videoUrl) {
                videoUrl = directMatch[1];
                platform = 'local';
                embedUrl = null;
                thumbnail = null;
            }
            
            const tiposEmoji = {
                'tutorial': '📚',
                'documental': '🎥',
                'entrevista': '🎤',
                'gameplay': '🎮',
                'review': '⭐',
                'vlog': '📹',
                'musica': '🎵',
                'otro': '🔧'
            };
            
            const fecha = new Date(issue.created_at).toLocaleDateString('es-ES', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            return {
                title: title,
                tipo: tipo,
                emoji: tiposEmoji[tipo] || '🎬',
                autor: autor,
                qid: qid,
                descripcion: descripcion,
                fecha: fecha,
                videoUrl: videoUrl,
                platform: platform,
                embedUrl: embedUrl,
                thumbnail: thumbnail,
                issueUrl: issue.html_url,
                comments: issue.comments,
                state: issue.state,
                labels: issue.labels,
                tieneVideo: !!videoUrl
            };
        }

        function crearVideoCard(data, index) {
            const plataformaClass = `platform-${data.platform}`;
            const plataformaNombre = data.platform === 'youtube' ? 'YouTube' : 
                                    data.platform === 'vimeo' ? 'Vimeo' : 'Archivo Local';
            
            return `
                <div class="video-card" data-index="${index}">
                    <div class="video-player-container">
                        ${data.thumbnail ? `
                            <img src="${data.thumbnail}" alt="${data.title}" class="video-thumbnail">
                            <div class="play-overlay" onclick="abrirVideoModal(${index})">
                                <div class="play-button">▶</div>
                            </div>
                        ` : `
                            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e, #0a0a0f);">
                                <div style="text-align: center; color: var(--neon-blue);">
                                    <div style="font-size: 3rem; margin-bottom: 10px;">🎬</div>
                                    <div style="font-size: 0.9rem;">${data.platform === 'local' ? 'Video Local' : 'Sin preview'}</div>
                                </div>
                                <div class="play-overlay" onclick="abrirVideoModal(${index})">
                                    <div class="play-button">▶</div>
                                </div>
                            </div>
                        `}
                    </div>
                    <div class="video-content">
                        <div class="video-header">
                            <span class="video-icon">${data.emoji}</span>
                            <h3 class="video-title" title="${data.title}">${data.title}</h3>
                        </div>
                        <div class="video-meta">
                            ${data.autor ? `<span>✍️ ${data.autor}</span>` : ''}
                            <span>📅 ${data.fecha}</span>
                            <span class="video-platform ${plataformaClass}">${plataformaNombre}</span>
                        </div>
                        <div class="video-description">${data.descripcion || 'Sin descripción'}</div>
                        <div class="labels">
                            <span class="label">${data.tipo}</span>
                            ${data.qid ? `<span class="label qid">🆔 ${data.qid}</span>` : ''}
                        </div>
                        <div class="video-actions">
                            <button onclick="abrirVideoModal(${index})" class="video-btn video-btn-primary">
                                ▶ Reproducir
                            </button>
                            <a href="${data.issueUrl}" target="_blank" class="video-btn video-btn-secondary">
                                💬 GitHub
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function extraerYouTubeId(url) {
            const match = url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        // Modal functions
        function abrirVideoModal(index) {
            const data = videosData[index].info;
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('modalPlayer');
            const title = document.getElementById('modalTitle');
            const meta = document.getElementById('modalMeta');
            
            // Construir reproductor según plataforma
            let playerHTML = '';
            
            if (data.platform === 'youtube' && data.embedUrl) {
                playerHTML = `<iframe src="${data.embedUrl}?autoplay=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            } else if (data.platform === 'vimeo' && data.embedUrl) {
                playerHTML = `<iframe src="${data.embedUrl}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else if (data.videoUrl) {
                // Video local o directo
                playerHTML = `<video controls autoplay style="width: 100%; height: 100%;"><source src="${data.videoUrl}" type="video/mp4"></video>`;
            }
            
            player.innerHTML = playerHTML;
            title.textContent = data.title;
            meta.innerHTML = `
                ${data.emoji} ${data.tipo} | 
                ${data.autor ? `✍️ ${data.autor} | ` : ''}
                📅 ${data.fecha}
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function cerrarVideoModal(event) {
            if (event && event.target !== event.currentTarget) return;
            
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('modalPlayer');
            
            modal.classList.remove('active');
            player.innerHTML = ''; // Detener reproducción
            document.body.style.overflow = '';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cerrarVideoModal();
            }
        });

        // Drag and drop
        const fileLabel = document.getElementById('fileLabel');
        
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = 'rgba(0, 243, 255, 0.2)';
        });
        
        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = '';
        });
        
        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('archivo').files = files;
                previsualizar(document.getElementById('archivo'));
            }
        });
    </script>
</body>
</html>
